<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Music Player 🎧</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #fce4ec; padding: 20px;">

    <div class="window" style="width: 350px; margin: 0 auto;">
        <div class="title-bar">
            <div class="title-bar-text">ILLIT_Player.exe</div>
        </div>
        <div class="window-body" style="text-align: center;">
            
            <div class="disk-container" style="margin: 20px 0;">
                <img id="player-cover" src="IMG_4456.jpeg" style="width: 180px; height: 180px; border-radius: 50%; border: 5px solid #333; animation: rotate 5s linear infinite;">
            </div>

            <h3 id="player-title">NOT CUTE ANYMORE</h3>
            <p id="player-artist" style="color: #666;">ILLIT (아일릿)</p>

            <hr>

            <audio id="main-audio" controls style="width: 100%; margin-bottom: 10px;">
                <source id="audio-source" src="song1.mp3" type="audio/mpeg">
            </audio>

            <div class="field-row" style="justify-content: center;">
                <button onclick="window.location.href='index.html?from=internal'">返回桌面</button>
                <button onclick="window.location.href='music.html'">换首歌</button>
            </div>
        </div>
    </div>

    <style>
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        // 歌曲数据库
        const songs = [
            { title: "NOT CUTE ANYMORE", cover: "IMG_4456.jpeg", file: "song1.mp3" },
            { title: "Billyeoon Goyangi (Do the Dance)", cover: "IMG_4457.jpeg", file: "song2.mp3" },
            { title: "Magnetic", cover: "IMG_4458.jpeg", file: "song3.mp3" }
        ];

        // 获取链接里的歌曲编号
        const urlParams = new URLSearchParams(window.location.search);
        let songIndex = urlParams.get('song') || 0; // 默认第一首

        // 自动切换播放器内容
        if (songs[songIndex]) {
            document.getElementById('player-title').innerText = songs[songIndex].title;
            document.getElementById('player-cover').src = songs[songIndex].cover;
            // 如果你有音频文件，取消下面这行的注释
            // document.getElementById('audio-source').src = songs[songIndex].file;
            // document.getElementById('main-audio').load();
        }
    </script>
</body>
</html>
