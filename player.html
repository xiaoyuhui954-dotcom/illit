<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Player 🎧</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 全局鼠标样式修改 */
html, body, a, button, input {
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%2378FFB1" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), auto !important;
}

/* 当鼠标移到按钮或链接上时，可以换成稍微深一点的青色，增加互动感 */
a:hover, button:hover {
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%2356D98E" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), pointer !important;
}

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .disk { width: 180px; height: 180px; border-radius: 50%; border: 5px solid #333; animation: rotate 5s linear infinite; object-fit: cover; }
    </style>
</head>
<body style="background: #fce4ec; padding: 20px;">
    <div class="window" style="width: 350px; margin: 0 auto;">
        <div class="title-bar"><div class="title-bar-text">ILLIT_Player.exe</div></div>
        <div class="window-body" style="text-align: center;">
            <div style="margin: 20px 0;"><img id="p-cover" src="IMG_4457.jpeg" class="disk"></div>
            <h3 id="p-title">Loading...</h3>
            <p style="color: #666; margin-bottom: 10px;">ILLIT (아일릿)</p>
            
            <audio id="main-audio" controls style="width: 100%; margin-bottom: 15px;">
                <source id="audio-src" src="" type="audio/mpeg">
            </audio>

            <hr>
            <div class="field-row" style="justify-content: center;">
                <button onclick="window.location.href='index.html?from=internal'">返回桌面</button>
                <button onclick="window.location.href='music.html'">换首歌</button>
            </div>
        </div>
    </div>

    <script>
        // 歌曲数据库：确保文件名与 GitHub 仓库一致
        const songs = [
            { title: "NOT CUTE ANYMORE", cover: "IMG_4457.jpeg", file: "ScreenRecording_04-26-2026 14-47-55_1 (online-audio-converter.com).mp3" }, 
            { title: "Billyeoon Goyangi", cover: "IMG_4458.jpeg", file: "ScreenRecording_04-26-2026 14-58-30_1 (online-audio-converter.com).mp3" }, 
            { title: "Magnetic", cover: "IMG_4456.jpeg", file: "magnetic.mp3.mp3" } 
        ];

        // 解析网址里的歌曲编号 (?song=X)
        const urlParams = new URLSearchParams(window.location.search);
        let idx = parseInt(urlParams.get('song')) || 0;

        // 自动装载对应内容
        if (songs[idx]) {
            document.getElementById('p-title').innerText = songs[idx].title;
            document.getElementById('p-cover').src = songs[idx].cover;
            const audio = document.getElementById('main-audio');
            const source = document.getElementById('audio-src');
            
            source.src = songs[idx].file;
            audio.load(); // 重新加载音频源
        }
    </script>
</body>
</html>
