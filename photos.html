<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Photo Booth ✨ Y2K Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        :root {
            --y2k-pink: #ff80ab;
            --y2k-purple: #ea80fc;
        }

        /* 极光背景 */
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #fce4ec, #e1f5fe, #f3e5f5, #e8f5e9);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            overflow: hidden; position: relative;
            font-family: sans-serif;
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { display: flex; gap: 30px; z-index: 10; align-items: center; }

        /* 拍立得相纸区域 */
        .polaroid {
            background: #fff; padding: 15px 15px 80px 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid #ddd; position: relative;
            transform: rotate(-1deg);
        }

        .cam-container {
            width: 320px; height: 400px; background: #222;
            position: relative; overflow: hidden; border: 2px solid #333;
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* 成员与贴纸通用样式 */
        .movable {
            position: absolute; cursor: move; user-select: none; z-index: 100;
            touch-action: none; transition: transform 0.2s;
        }
        .movable:hover { transform: scale(1.05); filter: brightness(1.1); }
        .member-sticker { height: 80%; bottom: 0; } /* 成员初始大小 */

        /* 控制面板 */
        .glass-ui {
            width: 320px; background: rgba(255, 255, 255, 0.4) !important;
            backdrop-filter: blur(12px); border-radius: 20px !important;
            border: 2px solid rgba(255, 255, 255, 0.6) !important;
        }

        .title-bar { background: linear-gradient(90deg, var(--y2k-pink), var(--y2k-purple)) !important; }

        .grid-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        
        .choice-btn {
            background: white; border: 2px solid var(--y2k-pink); border-radius: 10px;
            padding: 5px; cursor: pointer; font-size: 10px; font-weight: bold; color: var(--y2k-pink);
        }
        .choice-btn:hover { background: var(--y2k-pink); color: white; }

        .snap-btn {
            width: 100%; padding: 15px; margin-top: 20px;
            background: linear-gradient(45deg, #ff4081, #ea80fc);
            color: white; border: none; border-radius: 30px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="polaroid" id="capture-area">
            <div class="cam-container" id="sticker-zone">
                <video id="video" autoplay playsinline></video>
                </div>
            <div style="text-align: center; margin-top: 25px;">
                <span style="font-family: 'Comic Sans MS'; color: #ff80ab; font-size: 18px;">🌸 ILLIT & ME 🌸</span>
            </div>
        </div>

        <div class="window glass-ui">
            <div class="title-bar"><div class="title-bar-text">Dreamy_Studio.exe</div></div>
            <div class="window-body">
                <p><strong>✨ 第一步：召唤成员</strong></p>
                <div class="grid-box">
                    <button class="choice-btn" onclick="addMember('yunah')">YUNAH</button>
                    <button class="choice-btn" onclick="addMember('minju')">MINJU</button>
                    <button class="choice-btn" onclick="addMember('moka')">MOKA</button>
                    <button class="choice-btn" onclick="addMember('wonhee')">WONHEE</button>
                    <button class="choice-btn" onclick="addMember('iroha')">IROHA</button>
                    <button class="choice-btn" style="border-color:#ccc; color:#999;" onclick="clearItems()">❌ 清空</button>
                </div>

                <p style="margin-top:20px;"><strong>💖 第二步：添加可爱贴纸</strong></p>
                <div class="grid-box">
                    <button class="choice-btn" onclick="addEmoji('✨')">✨ 闪闪</button>
                    <button class="choice-btn" onclick="addEmoji('🎀')">🎀 蝴蝶结</button>
                    <button class="choice-btn" onclick="addEmoji('💖')">💖 爱心</button>
                </div>
                
                <button class="snap-btn" id="take-photo">📸 拍摄并保存合照</button>
                
                <center>
                    <button class="choice-btn" style="margin-top:20px; width:80px;" onclick="window.location.href='index.html'">返回</button>
                </center>
            </div>
        </div>
    </div>

    <canvas id="photo-canvas" width="640" height="800" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const zone = document.getElementById('sticker-zone');

        // 启动摄像头
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; });

        // 通用拖拽函数
        function makeDraggable(el) {
            let isDragging = false;
            el.addEventListener('mousedown', (e) => {
                isDragging = true;
                let shiftX = e.clientX - el.getBoundingClientRect().left;
                let shiftY = e.clientY - el.getBoundingClientRect().top;

                function moveAt(pageX, pageY) {
                    let rect = zone.getBoundingClientRect();
                    el.style.left = (pageX - rect.left - shiftX) + 'px';
                    el.style.top = (pageY - rect.top - shiftY) + 'px';
                }

                function onMouseMove(e) { if(isDragging) moveAt(e.pageX, e.pageY); }
                document.addEventListener('mousemove', onMouseMove);
                
                document.onmouseup = function() {
                    isDragging = false;
                    document.removeEventListener('mousemove', onMouseMove);
                };
            });
            el.ondragstart = () => false;
        }

        // 添加成员贴纸
        function addMember(name) {
            const img = document.createElement('img');
            img.src = `${name}_pose.png`; 
            img.className = 'movable member-sticker';
            img.style.left = '100px';
            img.style.top = '50px';
            zone.appendChild(img);
            makeDraggable(img);
        }

        // 添加文字/表情贴纸
        function addEmoji(emoji) {
            const span = document.createElement('div');
            span.innerHTML = emoji;
            span.className = 'movable';
            span.style.fontSize = '50px';
            span.style.left = '50px';
            span.style.top = '50px';
            zone.appendChild(span);
            makeDraggable(span);
        }

        function clearItems() {
            const items = zone.querySelectorAll('.movable');
            items.forEach(i => i.remove());
        }

        // 拍照合成
        document.getElementById('take-photo').addEventListener('click', () => {
            const canvas = document.getElementById('photo-canvas');
            const ctx = canvas.getContext('2d');
            
            // 1. 画背景
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 640, 800);
            
            // 2. 画摄像头 (镜像翻转)
            ctx.save();
            ctx.translate(600, 40); 
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 560, 700);
            ctx.restore();

            // 3. 循环画出所有移动元素
            const movables = zone.querySelectorAll('.movable');
            movables.forEach(el => {
                const rect = el.getBoundingClientRect();
                const zoneRect = zone.getBoundingClientRect();
                const x = (rect.left - zoneRect.left) * 2 + 40; // 这里的2是预览图到画布的缩放倍数
                const y = (rect.top - zoneRect.top) * 2 + 40;

                if (el.tagName === 'IMG') {
                    ctx.drawImage(el, x, y, el.clientWidth * 2, el.clientHeight * 2);
                } else {
                    ctx.font = "80px serif";
                    ctx.fillText(el.innerHTML, x, y + 70);
                }
            });

            // 下载
            const link = document.createElement('a');
            link.download = 'ILLIT_Summer_Photo.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
