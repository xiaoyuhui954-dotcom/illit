<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Photo Booth 📸✨</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --y2k-pink: #ff80ab;
            --y2k-blue: #80d8ff;
            --y2k-purple: #ea80fc;
        }

        /* --- 1. 高级极光背景 --- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #fce4ec, #e1f5fe, #f3e5f5, #e8f5e9);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 像素网格纹理 */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* --- 2. 自动漂浮的梦幻元素 --- */
        .deco-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star { position: absolute; animation: float 6s ease-in-out infinite; opacity: 0.6; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* --- 3. 拍立得容器升级 --- */
        .booth-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .polaroid-card {
            background: #fff;
            padding: 15px 15px 80px 15px;
            box-shadow: 0 20px 50px rgba(255, 128, 171, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transform: rotate(-2deg);
            transition: 0.3s;
        }
        .polaroid-card:hover { transform: rotate(0deg) scale(1.02); }

        .cam-box {
            width: 320px;
            height: 400px;
            background: #222;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
        }

        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        #member-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            height: 90%;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(255,193,227,0.5));
        }

        /* --- 4. 控制面板（玻璃拟态） --- */
        .glass-panel {
            width: 300px;
            background: rgba(255, 255, 255, 0.4) !important;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.6) !important;
            border-radius: 15px !important;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.05) !important;
        }

        .title-bar { background: linear-gradient(90deg, var(--y2k-pink), var(--y2k-purple)) !important; border-radius: 12px 12px 0 0 !important; }

        .member-btn {
            background: #fff;
            border: 2px solid var(--y2k-pink);
            color: var(--y2k-pink);
            padding: 8px;
            margin: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            border-radius: 20px;
            transition: 0.2s;
        }
        .member-btn:hover { background: var(--y2k-pink); color: #fff; }
        .member-btn.active { background: var(--y2k-pink); color: #fff; box-shadow: 0 0 10px var(--y2k-pink); }

        .snap-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff4081, #ea80fc);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 64, 129, 0.4);
            margin-top: 15px;
        }
        .snap-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="deco-container" id="deco"></div>

    <div class="booth-wrapper">
        <div class="polaroid-card">
            <div class="cam-box">
                <video id="video" autoplay playsinline></video>
                <img id="member-overlay" src="" style="display: none;">
                <div style="position: absolute; top: 10px; left: 10px; color: #fff; font-size: 10px; opacity: 0.7;">
                    REC ● 2026.04.26
                </div>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <img src="https://img.icons8.com/color/48/000000/filled-like.png" style="width:20px;">
                <span style="font-family: 'Brush Script MT', cursive; font-size: 20px; color: #ff80ab; margin-left: 10px;">Lucky Girl Syndrome</span>
            </div>
        </div>

        <div class="window glass-panel">
            <div class="title-bar">
                <div class="title-bar-text">ILLIT_CAM_v2.exe</div>
            </div>
            <div class="window-body">
                <p style="font-size: 12px; color: #666;">✨ 选择你要合影的成员：</p>
                <div style="display: flex; flex-wrap: wrap; justify-content: center;">
                    <button class="member-btn" onclick="selectMember('none', this)">❌ Solo</button>
                    <button class="member-btn" onclick="selectMember('yunah', this)">YUNAH</button>
                    <button class="member-btn" onclick="selectMember('minju', this)">MINJU</button>
                    <button class="member-btn" onclick="selectMember('moka', this)">MOKA</button>
                    <button class="member-btn" onclick="selectMember('wonhee', this)">WONHEE</button>
                    <button class="member-btn" onclick="selectMember('iroha', this)">IROHA</button>
                </div>
                
                <button class="snap-btn" id="take-photo">📸 TAKE SHOT</button>
                
                <center>
                    <p onclick="window.location.href='index.html?from=internal'" style="margin-top:20px; font-size:10px; cursor:pointer; color:#9c27b0; text-decoration:underline;">EXIT TO SYSTEM</p>
                </center>
            </div>
        </div>
    </div>

    <canvas id="photo-canvas" width="640" height="800" style="display:none;"></canvas>

    <script>
        // 生成漂浮星星
        const deco = document.getElementById('deco');
        const stars = ['✨', '💖', '⭐', '🌈', '🍭'];
        for (let i = 0; i < 15; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.innerHTML = stars[Math.floor(Math.random()*stars.length)];
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            s.style.fontSize = (Math.random() * 20 + 20) + 'px';
            s.style.animationDelay = (Math.random() * 5) + 's';
            deco.appendChild(s);
        }

        // 相机逻辑
        const video = document.getElementById('video');
        const overlay = document.getElementById('member-overlay');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("无法访问摄像头", err));

        function selectMember(name, btn) {
            // 按钮样式切换
            document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 图片切换（假设你的图片命名为 yunah_pose.png 等）
            if (name === 'none') {
                overlay.style.display = 'none';
            } else {
                overlay.src = `391.jpeg`; // 这里可以换成你对应的成员图片文件名
                overlay.style.display = 'block';
            }
        }

        // 拍照逻辑
        document.getElementById('take-photo').addEventListener('click', () => {
            const canvas = document.getElementById('photo-canvas');
            const ctx = canvas.getContext('2d');
            
            // 绘制白底拍立得背景
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 640, 800);
            
            // 绘制画面
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -600, 40, 560, 650);
            ctx.restore();
            
            // 如果有成员叠加
            if(overlay.style.display !== 'none') {
                const img = new Image();
                img.src = overlay.src;
                img.onload = () => {
                    ctx.drawImage(img, 300, 200, 300, 500);
                    download(canvas);
                }
            } else {
                download(canvas);
            }
        });

        function download(canvas) {
            const link = document.createElement('a');
            link.download = 'ILLIT_ME_Y2K.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
