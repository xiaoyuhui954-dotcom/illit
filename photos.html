<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHOTO ZONE 📸</title>
    <style>
        /* 延续 image_48.png 的粉色波点背景 */
        body {
            margin: 0; padding: 0;
            background-color: #ffb2d1;
            background-image: radial-gradient(#ffffff 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            font-family: "Courier New", Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        /* 复古 Windows 窗口 */
        .window {
            background: #fff; border: 2px solid #5a8bc1; box-shadow: 2px 2px 0px #000;
            width: 90%; max-width: 450px; position: relative;
        }
        .win-header {
            background: linear-gradient(to right, #73a3d4, #b2d1f0);
            padding: 4px 8px; display: flex; justify-content: space-between;
            color: white; font-size: 12px; border-bottom: 2px solid #5a8bc1;
        }
        .win-btns span { border: 1px solid #fff; padding: 0 5px; margin-left: 2px; background: #eee; color: #000; font-size: 10px; }

        /* 合照交互区 */
        .photo-container {
            position: relative; width: 90%; height: 350px; 
            border: 2px dashed #ff4081; background: #eee; 
            margin: 15px auto; overflow: hidden;
        }
        .main-img { width: 100%; height: 100%; object-fit: cover; }

        /* 可拖拽贴纸样式 */
        .sticker {
            position: absolute; width: 60px; cursor: move; 
            user-select: none; z-index: 10;
        }

        .controls { padding: 10px; border-top: 1px solid #ccc; text-align: center; }
        .btn-retro {
            background: #efefef; border: 1px solid #999; padding: 8px 20px;
            font-size: 11px; cursor: pointer; box-shadow: 1px 1px 0 #000;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="win-header">
            <span>PHOTO_ZONE.exe</span>
            <div class="win-btns"><span>_</span><span>▢</span><span>X</span></div>
        </div>
        
        <div class="win-body">
            <p style="font-size:10px; color:#ff4081; margin:10px;">✨ 拖动下方贴纸到照片上进行装饰 ✨</p>
            
            <div class="photo-container" id="drop-zone">
                <!-- 你的五人合照 -->
                <img src="group_photo.png" class="main-img" alt="ILLIT Group">
                
                <!-- 预设贴纸 (你可以换成自己的贴纸图片地址) -->
                <img src="heart_sticker.png" class="sticker" style="top:10px; left:10px;" id="s1">
                <img src="star_sticker.png" class="sticker" style="top:50px; left:20px;" id="s2">
                <img src="y2k_logo.png" class="sticker" style="top:100px; left:30px;" id="s3">
            </div>

            <div class="controls">
                <button class="btn-retro" onclick="alert('截图功能已就绪！')">SAVE TO ALBUM</button>
                <button class="btn-retro" onclick="location.reload()">RESET</button>
            </div>
        </div>
    </div>

    <script>
        // 拖拽逻辑实现
        const stickers = document.querySelectorAll('.sticker');

        stickers.forEach(sticker => {
            sticker.onmousedown = function(event) {
                let shiftX = event.clientX - sticker.getBoundingClientRect().left;
                let shiftY = event.clientY - sticker.getBoundingClientRect().top;

                sticker.style.zIndex = 1000;

                function moveAt(pageX, pageY) {
                    // 计算在父容器内的相对坐标
                    let containerRect = document.getElementById('drop-zone').getBoundingClientRect();
                    let left = pageX - shiftX - containerRect.left;
                    let top = pageY - shiftY - containerRect.top;
                    
                    sticker.style.left = left + 'px';
                    sticker.style.top = top + 'px';
                }

                function onMouseMove(event) {
                    moveAt(event.pageX, event.pageY);
                }

                document.addEventListener('mousemove', onMouseMove);

                sticker.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    sticker.onmouseup = null;
                };
            };

            sticker.ondragstart = function() {
                return false;
            };
        });
    </script>
</body>
</html>
