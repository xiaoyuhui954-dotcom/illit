<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>换装小游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="character">
      <img id="character-body" src="body.png" alt="Character Body">
      <img id="character-clothes" src="default_clothes.png" alt="Clothes" class="clothes">
    </div>

    <div class="clothes-options">
      <button onclick="changeClothes('clothes1.png')">穿衣1</button>
      <button onclick="changeClothes('clothes2.png')">穿衣2</button>
      <button onclick="changeClothes('clothes3.png')">穿衣3</button>
    </div>
    <div class="back-button">
      <button onclick="window.location.href='menu.html'">返回菜单</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
