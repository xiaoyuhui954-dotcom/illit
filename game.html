<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT 换装间 🎀</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container { display: flex; gap: 20px; justify-content: center; padding: 10px; }
        /* 模特区域 */
        .model-area { 
            position: relative; width: 200px; height: 300px; 
            background: #fff; border: 2px inset #ccc; overflow: hidden;
        }
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        /* 衣柜区域 */
        .closet { width: 150px; display: flex; flex-direction: column; gap: 10px; }
        .item-box { border: 1px solid #888; padding: 5px; background: #eee; cursor: pointer; text-align: center; }
        .item-box:hover { background: #ffc1e3; }
    </style>
</head>
<body style="background-color: #f8bbd0; padding: 20px;">

    <div class="window" style="width: 450px; margin: 0 auto;">
        <div class="title-bar">
            <div class="title-bar-text">ILLIT_DressUp_Beta.exe</div>
        </div>
        <div class="window-body">
            <p style="text-align: center;">搭配你的 Magnetic Style! ✨</p>
            
            <div class="game-container">
                <div class="model-area">
                    <img id="body" src="model_base.png" class="layer">
                    <img id="hair-layer" src="" class="layer" style="display: none;">
                    <img id="outfit-layer" src="" class="layer" style="display: none;">
                </div>

                <div class="closet">
                    <strong>选择发型:</strong>
                    <div class="item-box" onclick="changeItem('hair-layer', 'hair1.png')">发型 A</div>
                    <div class="item-box" onclick="changeItem('hair-layer', 'hair2.png')">发型 B</div>
                    
                    <hr>
                    <strong>选择衣服:</strong>
                    <div class="item-box" onclick="changeItem('outfit-layer', 'cloth1.png')">打歌服 A</div>
                    <div class="item-box" onclick="changeItem('outfit-layer', 'cloth2.png')">打歌服 B</div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <button onclick="window.location.href='index.html?from=internal'">返回桌面</button>
            </div>
        </div>
    </div>

    <script>
        function changeItem(layerId, imgSrc) {
            const layer = document.getElementById(layerId);
            layer.src = imgSrc;
            layer.style.display = 'block';
        }
    </script>
</body>
</html>
