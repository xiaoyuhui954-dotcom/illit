<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT 换装间 🎀</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        /* 全局鼠标样式修改 */
html, body, a, button, input {
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%2378FFB1" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), auto !important;
}

/* 当鼠标移到按钮或链接上时，可以换成稍微深一点的青色，增加互动感 */
a:hover, button:hover {
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%2356D98E" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), pointer !important;
}

        /* --- 全局 Y2K 风格调整 --- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* 渐变背景 + 极光动画 */
            background: linear-gradient(135deg, #ffc1e3 0%, #e1bee7 50%, #b3e5fc 100%);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            font-family: 'MS UI Gothic', 'Courier New', monospace;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 索引条保持 */
        .global-nav-bar {
            width: 100%; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px); border-bottom: 2px solid #ff80ab;
            padding: 10px 0; display: flex; justify-content: center;
            gap: 15px; position: fixed; top: 0; left: 0; z-index: 9999;
        }
        .global-nav-bar a {
            text-decoration: none; color: #ff4081; font-size: 14px;
            font-weight: bold; padding: 3px 8px;
        }

        /* --- 游戏窗口大升级 --- */
        .window {
            margin-top: 80px !important;
            width: 95% !important; /* 手机端宽度 */
            max-width: 900px !important; /* 电脑端宽度限制 */
            background: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 10px 10px 0px rgba(255, 128, 171, 0.2);
            transition: 0.3s;
        }

        .game-container {
            display: flex;
            flex-direction: row; /* 电脑端横向 */
            gap: 30px;
            justify-content: center;
            padding: 20px;
        }

        /* 模特区域变大 */
        .model-area { 
            position: relative; 
            width: 350px; /* 增加宽度 */
            height: 500px; /* 增加高度 */
            background: #fff; 
            border: 4px inset #ff80ab; 
            overflow: hidden;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }

        /* 衣柜区域优化 */
        .closet { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: rgba(255,255,255,0.4);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #fff;
        }
        .item-group { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        
        .item-box { 
            border: 2px solid #ffb2d1; 
            padding: 8px; 
            background: #fff; 
            cursor: pointer; 
            text-align: center; 
            font-size: 12px;
            border-radius: 8px;
            box-shadow: 2px 2px 0px #ffb2d1;
        }
        .item-box:hover { background: #ffecf2; transform: translate(-1px, -1px); box-shadow: 3px 3px 0px #ff80ab; }

        /* --- 动态装饰 --- */
        .floating-deco {
            position: fixed; pointer-events: none; opacity: 0.25; z-index: -1;
            animation: drift linear infinite;
        }
        @keyframes drift {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .game-container { flex-direction: column; align-items: center; }
            .model-area { width: 280px; height: 400px; }
            .window { width: 98% !important; margin-top: 60px !important; }
        }
    </style>
</head>
<body>

    <!-- 导航索引条 -->
    <div class="global-nav-bar">
        <a href="index.html">🏠 首页</a>
        <a href="music.html">🎶 音乐</a>
        <a href="menu.html">📁 档案</a>
        <a href="game.html">🎮 游戏</a>
        <a href="photo.html">📸 合照</a>
        <a href="messages.html">💬 留言</a>
        <a href="square.html">✨ 广场</a>
    </div>

    <!-- 动态装饰背景层 -->
    <div id="deco-layer"></div>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">ILLIT_DressUp_v2.0.exe</div>
        </div>
        <div class="window-body">
            <p style="text-align: center; font-weight: bold; color: #ff4081;">🎀 搭配你的 Magnetic Style! 🎀</p>
            
            <div class="game-container">
               <!-- 模特预览区 -->
                <div class="model-area">
                    <img id="body" src="model_base.png" class="layer">
                    <img id="hair-layer" src="" class="layer" style="display: none;">
                    <img id="outfit-layer" src="" class="layer" style="display: none;">
                </div>

               


                <!-- 交互衣柜区 -->
                <div class="closet">
                    <strong>💇 选择发型:</strong>
                    <div class="item-group">
                        <div class="item-box" onclick="changeItem('hair-layer', 'hair1.png')">柔顺长发</div>
                        <div class="item-box" onclick="changeItem('hair-layer', 'hair2.png')">活力双马尾</div>
                    </div>
                    
                    <hr>
                    <strong>👗 选择衣服:</strong>
                    <div class="item-group">
                        <div class="item-box" onclick="changeItem('outfit-layer', 'cloth1.png')">粉色打歌服</div>
                        <div class="item-box" onclick="changeItem('outfit-layer', 'cloth2.png')">舞台薄纱裙</div>
                    </div>
                </div>
            </div>

            <div style="text-align: center; margin-top: 15px; padding-bottom: 10px;">
                <button onclick="window.location.href='index.html?from=internal'">保存并退出</button>
            </div>
        </div>
    </div>

    <script>
        // 更换装扮函数
        function changeItem(layerId, imgSrc) {
            const layer = document.getElementById(layerId);
            layer.src = imgSrc;
            layer.style.display = 'block';
        }

        // 生成不显眼的动态背景装饰
        const decoLayer = document.getElementById('deco-layer');
        const icons = ['🌸', '✨', '☁️', '💖', '⭐'];
        for (let i = 0; i < 20; i++) {
            const el = document.createElement('div');
            el.className = 'floating-deco';
            el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 15 + 10) + 'px';
            el.style.animationDuration = (Math.random() * 10 + 15) + 's'; // 较慢的移动速度
            el.style.animationDelay = (Math.random() * 5) + 's';
            el.style.top = '110vh';
            decoLayer.appendChild(el);
        }
    </script>
</body>
</html>
