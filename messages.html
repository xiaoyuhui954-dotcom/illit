<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Message Board 💬</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #board { width: 100%; height: 200px; background: #fff; border: 2px solid #333; margin-bottom: 10px; position: relative; overflow: hidden; }
        .danmu { position: absolute; white-space: nowrap; font-weight: bold; color: #ff4081; animation: slide 5s linear forwards; }
        @keyframes slide { from { left: 100%; } to { left: -100%; } }
    </style>
</head>
<body style="background: #fce4ec; padding: 20px;">
    <div class="window" style="width: 400px; margin: 0 auto;">
        <div class="title-bar"><div class="title-bar-text">Message_Board.sys</div></div>
        <div class="window-body">
            <div id="board"></div>
            <div class="field-row-stacked">
                <label>写下你想对 ILLIT 说的话：</label>
                <input id="msgInput" type="text" style="width: 100%;">
            </div>
            <div class="field-row" style="justify-content: flex-end; margin-top: 10px;">
                <button onclick="sendMsg()">发送弹幕</button>
                <button onclick="window.location.href='index.html?from=internal'">返回桌面</button>
            </div>
        </div>
    </div>

    <script>
        function sendMsg() {
            const input = document.getElementById('msgInput');
            if(!input.value) return;
            const msg = document.createElement('div');
            msg.className = 'danmu';
            msg.innerText = input.value;
            msg.style.top = Math.random() * 170 + 'px';
            document.getElementById('board').appendChild(msg);
            input.value = '';
            setTimeout(() => msg.remove(), 5000);
        }
    </script>
</body>
</html>
