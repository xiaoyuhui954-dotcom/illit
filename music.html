<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Dreamy Player 🎀</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --dream-pink: #ffc1e3;
            --dream-purple: #e1bee7;
            --pixel-border: 4px solid #333;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 核心 MP3 播放器容器 */
        .mp3-player {
            width: 340px;
            background: var(--dream-pink);
            border: var(--pixel-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 8px 8px 0px rgba(255, 128, 171, 0.3);
            position: relative;
        }

        /* 像素屏幕区域 */
        .player-screen {
            background: #222;
            border: 3px solid #555;
            border-radius: 10px;
            padding: 15px;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 5px #00ffcc;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 旋转唱片 */
        .disk-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            position: relative;
        }

        .disk {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #fff;
            object-fit: cover;
            animation: rotate 6s linear infinite;
            animation-play-state: paused;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 模拟像素频谱图 */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 30px;
            justify-content: center;
            margin-top: 10px;
        }

        .bar {
            width: 4px;
            background: #00ffcc;
            animation: bounce 0.5s ease-in-out infinite alternate;
            animation-play-state: paused;
        }

        @keyframes bounce {
            from { height: 5px; }
            to { height: 25px; }
        }

        /* 像素控制按钮 */
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .pixel-btn {
            background: #fff;
            border: 2px solid #333;
            box-shadow: 3px 3px 0px #333;
            padding: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.1s;
        }

        .pixel-btn:active {
            box-shadow: 0px 0px 0px #333;
            transform: translate(3px, 3px);
        }

        /* 隐藏原生音频播放器，只留逻辑 */
        audio { display: none; }

        /* 星星特效 */
        .star-effect {
            position: fixed;
            pointer-events: none;
            z-index: 99;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="mp3-player">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span style="font-weight: bold; color: #fff; font-size: 12px;">ILLIT DreamPlayer v1.0</span>
            <div style="display: flex; gap: 4px;">
                <div style="width: 8px; height: 8px; background: #ff4081; border-radius: 50%;"></div>
                <div style="width: 8px; height: 8px; background: #fff; border-radius: 50%;"></div>
            </div>
        </div>

        <div class="player-screen">
            <div class="disk-wrapper">
                <img id="p-cover" src="IMG_4457.jpeg" class="disk">
            </div>
            <div style="text-align: center; font-size: 14px; margin-bottom: 5px;" id="p-title">LOADING...</div>
            
            <div class="visualizer" id="viz">
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.3s"></div>
                <div class="bar" style="animation-delay: 0.2s"></div>
                <div class="bar" style="animation-delay: 0.4s"></div>
                <div class="bar" style="animation-delay: 0.1s"></div>
                <div class="bar" style="animation-delay: 0.5s"></div>
            </div>
        </div>

        <div style="display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px;">
            <button class="pixel-btn" style="font-size: 10px; white-space: nowrap;" onclick="changeSong(0)">Magnetic</button>
            <button class="pixel-btn" style="font-size: 10px; white-space: nowrap;" onclick="changeSong(1)">CuteAnymore</button>
            <button class="pixel-btn" style="font-size: 10px; white-space: nowrap;" onclick="changeSong(2)">Billyeoon</button>
        </div>

        <div class="controls-grid">
            <button class="pixel-btn" onclick="audio.currentTime -= 10">⏪</button>
            <button class="pixel-btn" id="playBtn" onclick="togglePlay()">▶️</button>
            <button class="pixel-btn" onclick="audio.currentTime += 10">⏩</button>
        </div>

        <center>
            <button style="margin-top: 20px; border: none; background: transparent; cursor: pointer; text-decoration: underline; color: #7b1fa2;" onclick="window.location.href='index.html?from=internal'">
                返回桌面系统
            </button>
        </center>
    </div>

    <audio id="main-audio">
        <source id="audio-src" src="magnetic.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const songs = [
            { title: "Magnetic", cover: "IMG_4458.jpeg", file: "magnetic.mp3.mp3" },
            { title: "NOT CUTE ANYMORE", cover: "IMG_4456.jpeg", file: "magnetic.mp3.mp3" },
            { title: "Billyeoon Goyangi", cover: "IMG_4457.jpeg", file: "ScreenRecording_04-26-2026 14-58-30_1 (online-audio-converter.com).mp3" }
        ];

        const audio = document.getElementById('main-audio');
        const cover = document.getElementById('p-cover');
        const title = document.getElementById('p-title');
        const source = document.getElementById('audio-src');
        const playBtn = document.getElementById('playBtn');
        const bars = document.querySelectorAll('.bar');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸️";
                cover.style.animationPlayState = 'running';
                bars.forEach(b => b.style.animationPlayState = 'running');
            } else {
                audio.pause();
                playBtn.innerText = "▶️";
                cover.style.animationPlayState = 'paused';
                bars.forEach(b => b.style.animationPlayState = 'paused');
            }
        }

        function changeSong(index) {
            const song = songs[index];
            title.innerText = song.title;
            cover.src = song.cover;
            source.src = song.file;
            audio.load();
            if (!audio.paused || playBtn.innerText === "⏸️") {
                audio.play();
                cover.style.animationPlayState = 'running';
                bars.forEach(b => b.style.animationPlayState = 'running');
            }
        }

        // 星星特效
        document.addEventListener('mousemove', function(e) {
            const star = document.createElement('div');
            star.className = 'star-effect';
            star.innerHTML = ['✨', '🌸', '💫', '⭐'][Math.floor(Math.random()*4)];
            star.style.left = e.clientX + 'px';
            star.style.top = e.clientY + 'px';
            star.style.color = ['#ff80ab', '#f48fb1', '#ce93d8', '#ffffff'][Math.floor(Math.random()*4)];
            document.body.appendChild(star);
            
            let opacity = 1;
            const ani = setInterval(() => {
                opacity -= 0.05;
                star.style.opacity = opacity;
                star.style.transform = `scale(${opacity + 0.5}) translateY(${20 - opacity*20}px)`;
                if(opacity <= 0) { clearInterval(ani); star.remove(); }
            }, 30);
        });
    </script>
</body>
</html>
