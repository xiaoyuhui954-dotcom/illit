<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MP3</title>

<style>
body {
    margin: 0;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    font-family: "Courier New";
}

.player {
    width: 250px;
    height: 320px;
    background: #ff77a3; /* 粉色背景 */
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}

.screen {
    width: 100%;
    height: 120px;
    background: #222;
    border-radius: 10px;
    margin-bottom: 15px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    letter-spacing: 3px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #fff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    margin: 10px 0;
}

button:hover {
    background-color: #f0f0f0;
}

.player-buttons {
    display: flex;
    gap: 10px;
}

.heart, .star {
    position: absolute;
    font-size: 32px;
    color: rgba(255, 0, 0, 0.3);
    animation: floating 5s infinite ease-in-out;
}

.heart {
    top: 20%;
    left: 10%;
}

.star {
    top: 30%;
    right: 10%;
}

@keyframes floating {
    0% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0); }
}
</style>
</head>

<body>

<div class="heart">❤️</div>
<div class="star">⭐</div>

<div class="player">
    <div class="screen">MP3 Player</div>

    <audio id="audio" src="music.mp3"></audio>

    <div class="player-buttons">
        <button onclick="play()">▶</button>
        <button onclick="pause()">⏸</button>
    </div>

    <button onclick="goBack()">返回首页</button>
</div>

<script>
let audio = document.getElementById("audio");

function play() {
    audio.play();
}

function pause() {
    audio.pause();
}

function goBack() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
