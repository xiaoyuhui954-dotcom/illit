<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Record Store 💿</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .album-wall { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .album-wall a:last-child { grid-column: span 2; justify-self: center; }
        .album-art { width: 140px; height: 140px; border: 2px solid #333; object-fit: cover; }
        .album-title { font-size: 11px; text-align: center; margin-top: 5px; color: #333; }
        .cd-case { text-decoration: none; transition: transform 0.2s; }
        .cd-case:hover { transform: scale(1.05); }
    </style>
</head>
<body style="background: #fce4ec; padding: 20px;">
    <div class="window" style="width: 450px; margin: 0 auto;">
        <div class="title-bar"><div class="title-bar-text">ILLIT_Store.sys</div></div>
        <div class="window-body">
            <h3 style="text-align: center;">请选择一张 CD：</h3>
            <div class="album-wall">
                <a href="player.html?song=0" class="cd-case">
                    <img src="IMG_4457.jpeg" class="album-art">
                    <p class="album-title">NOT CUTE ANYMORE</p>
                </a>
                <a href="player.html?song=1" class="cd-case">
                    <img src="IMG_4458.jpeg" class="album-art">
                    <p class="album-title">Billyeoon Goyangi</p>
                </a>
                <a href="player.html?song=2" class="cd-case">
                    <img src="IMG_4456.jpeg" class="album-art">
                    <p class="album-title">Magnetic</p>
                </a>
            </div>
            <hr>
            <div style="text-align: center;">
                <button onclick="window.location.href='index.html?from=internal'">返回桌面</button>
            </div>
        </div>
    </div>
</body>
</html>
