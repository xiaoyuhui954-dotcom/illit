<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT 音像店 💿</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8bbd0; padding: 30px; }
        
        /* 专辑墙的布局 */
        .album-wall {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        /* 专辑 CD 的容器 */
        .cd-case {
            width: 150px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cd-case:hover {
            transform: scale(1.05); /* 鼠标放上去稍微变大 */
        }

        /* 这是放图片的地方：设定大小和边框 */
        .album-art {
            width: 100%;
            height: 150px;
            border: 2px solid #333;
            box-shadow: 3px 3px #808080;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="window" style="width: 500px; margin: 0 auto;">
        <div class="title-bar">
            <div class="title-bar-text">ILLIT_Record_Store.sys</div>
        </div>
        <div class="window-body">
            <h3 style="text-align: center;">请选择一张 CD：</h3>
            
            <div class="album-wall">
                
                <a href="player.html" class="cd-case">
                    <img src="IMG_4456.jpeg" class="album-art" alt="Album1">
                    <p style="font-size: 11px; text-align: center; color: #333;">Magnetic</p>
                </a>

                <a href="player.html" class="cd-case">
                    <img src="IMG_4457.jpeg" class="album-art" alt="Album2">
                    <p style="font-size: 11px; text-align: center; color: #333;">Lucky Girl</p>
                </a>

                <a href="player.html" class="cd-case">
                    <img src="IMG_4458.jpeg" class="album-art" alt="Album3">
                    <p style="font-size: 11px; text-align: center; color: #333;">Midnight Fiction</p>
                </a>

            </div>

            <hr>
            <div style="text-align: center; margin-top: 15px;">
                <button onclick="window.location.href='index.html?from=internal'">返回桌面</button>
            </div>
        </div>
    </div>

</body>
</html>
