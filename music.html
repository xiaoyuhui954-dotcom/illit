<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT Flip-Phone Player 🎀</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        /* 全局鼠标样式修改 */
html, body, a, button, input {
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%2378FFB1" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), auto !important;
}

/* 当鼠标移到按钮或链接上时，可以换成稍微深一点的青色，增加互动感 */
a:hover, button:hover {
    cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%2356D98E" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), pointer !important;
}

        :root {
            --phone-pink: #ff99cc;
            --screen-dark: #1a1a1a;
            --list-pink: rgba(255, 192, 203, 0.8);
        }

        /* 保持你的极光背景不变 */
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(135deg, #ffc1e3 0%, #e1bee7 35%, #b3e5fc 70%, #ffc1e3 100%);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            overflow: hidden; position: relative;
            font-family: 'Courier New', monospace;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 播放器总容器：横向排列手机和歌单 */
        .player-container {
            display: flex; align-items: flex-start; gap: 30px; z-index: 10;
            max-width: 900px; width: 95%;
        }

        /* --- 左侧：翻盖手机 --- */
        .flip-phone {
            width: 260px; background: var(--phone-pink);
            border-radius: 30px; padding: 15px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
            border: 3px solid #fff;
        }

        /* 手机屏幕区 */
        .phone-screen {
            background: var(--screen-dark); border-radius: 15px;
            padding: 15px; position: relative; border: 4px solid #333;
            margin-bottom: 15px; height: 320px;
            display: flex; flex-direction: column; align-items: center;
        }

        .status-bar { width: 100%; display: flex; justify-content: space-between; font-size: 10px; color: #fff; margin-bottom: 20px; }

        /* CD转盘封面 */
        .disk-wrapper { width: 160px; height: 160px; position: relative; margin: 10px 0; }
        .disk {
            width: 100%; height: 100%; border-radius: 50%;
            border: 5px solid #fff; object-fit: cover;
            animation: rotate 6s linear infinite; animation-play-state: paused;
        }
        .disk::after { /* CD中心圆孔 */
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 30px; height: 30px;
            background: #1a1a1a; border-radius: 50%; border: 2px solid #fff;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 手机键盘区 */
        .phone-keypad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            background: rgba(255,255,255,0.3); padding: 15px; border-radius: 15px;
        }
        .key {
            background: #fff; border: none; border-radius: 5px;
            padding: 8px; font-size: 12px; font-weight: bold; color: var(--phone-pink);
            cursor: pointer; box-shadow: 0 3px 0 #d482ab;
        }
        .key:active { transform: translateY(2px); box-shadow: 0 1px 0 #d482ab; }
        .key.play-key { background: #ff4081; color: #fff; grid-column: span 1; font-size: 18px; }

        /* --- 右侧：歌单列表 --- */
        .track-list-window {
            flex: 1; background: var(--list-pink); border-radius: 20px;
            border: 3px solid #fff; backdrop-filter: blur(10px);
            max-height: 500px; overflow-y: auto;
        }
        .list-header { background: #ff80ab; color: #fff; padding: 10px 20px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .track-item {
            display: flex; align-items: center; padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; transition: 0.3s;
        }
        .track-item:hover { background: rgba(255,255,255,0.4); }
        .track-item.active { background: #fff; color: #ff4081; }
        .track-index { font-size: 18px; font-weight: bold; width: 30px; opacity: 0.5; }
        .track-info { flex: 1; margin-left: 10px; }
        .track-name { font-size: 14px; font-weight: bold; }
        .track-artist { font-size: 11px; opacity: 0.8; }

        /* 装饰元素 */
        .deco-item { position: absolute; pointer-events: none; z-index: -1; animation: floatUp linear infinite; }
        .star-effect { position: fixed; pointer-events: none; z-index: 999; font-size: 26px; }

        /* 返回按钮 */
        .exit-btn {
            margin-top: 20px; color: #fff; text-decoration: underline; cursor: pointer;
            font-size: 12px; display: block; text-align: center;
        }
        /* 索引条样式 */
.global-nav-bar {
    width: 100%; background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(5px); border-bottom: 2px solid #ff80ab;
    padding: 8px 0; display: flex; justify-content: center;
    gap: 15px; position: fixed; top: 0; left: 0; z-index: 9999;
}
.global-nav-bar a {
    text-decoration: none; color: #ff4081; font-size: 12px;
    font-weight: bold; padding: 3px 8px;
}
/* 修正内容下移，防止被导航条遮挡 */
.player-container { margin-top: 60px; }

    </style>
</head>
<body>
<!-- 全局导航条 -->
<div class="global-nav-bar">
    <a href="index.html">🏠 首页</a>
    <a href="menu.html">📁 档案</a>
    <a href="game.html">🎮 游戏</a>
    <a href="photo.html">📸 合照</a>
    <a href="messages.html">💬 留言</a>
    <a href="square.html">✨ 广场</a>
</div>

    <div id="bg-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>

    <div class="player-container">
        <!-- 翻盖手机部分 -->
        <div class="flip-phone">
            <div class="phone-screen">
                <div class="status-bar">
                    <span>♡♡♡</span>
                    <span id="p-time">00:00</span>
                </div>
                <div class="disk-wrapper">
                    <img id="p-cover" src="IMG_4458.jpeg" class="disk">
                </div>
                <div id="p-title" style="color:#ff80ab; margin-top:10px; font-weight:bold;">Magnetic</div>
                <div style="font-size:10px; color:#fff; margin-top:5px;">ILLIT</div>
            </div>

            <div class="phone-keypad">
                <button class="key" onclick="audio.currentTime -= 5">⏮</button>
                <button class="key play-key" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="key" onclick="audio.currentTime += 5">⏭</button>
                <button class="key">1</button><button class="key">2</button><button class="key">3</button>
                <button class="key">4</button><button class="key">5</button><button class="key">6</button>
            </div>
            <a class="exit-btn" onclick="window.location.href='index.html'">EXIT TO DESKTOP</a>
        </div>

        <!-- 歌单部分 -->
        <div class="track-list-window">
            <div class="list-header">🎵 TRACKLIST</div>
            <div id="playlist-container">
                <!-- 歌单由JS生成 -->
            </div>
        </div>
    </div>

    <audio id="main-audio">
        <source id="audio-src" src="magnetic.mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const songs = [
            { title: "Magnetic", cover: "IMG_4458.jpeg", file: "magnetic.mp3.mp3", artist: "NewJeans 1st EP" },
            { title: "NOT CUTE ANYMORE", cover: "IMG_4456.jpeg", file: "ScreenRecording_04-26-2026 14-47-55_1 (online-audio-converter.com).mp3", artist: "ILLIT Special" },
            { title: "Billyeoon Goyangi", cover: "IMG_4457.jpeg", file: "ScreenRecording_04-26-2026 14-58-30_1 (online-audio-converter.com).mp3", artist: "Cat Theme" }
        ];

        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('playBtn');
        const cover = document.getElementById('p-cover');
        const title = document.getElementById('p-title');
        const source = document.getElementById('audio-src');
        const playlistContainer = document.getElementById('playlist-container');

        // 初始化歌单
        function initPlaylist() {
            playlistContainer.innerHTML = songs.map((song, i) => `
                <div class="track-item ${i===0?'active':''}" onclick="changeSong(${i})">
                    <div class="track-index">0${i+1}</div>
                    <div class="track-info">
                        <div class="track-name">${song.title}</div>
                        <div class="track-artist">${song.artist}</div>
                    </div>
                    <div style="font-size:10px; opacity:0.5;">3:00</div>
                </div>
            `).join('');
        }
        initPlaylist();

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
                cover.style.animationPlayState = 'running';
            } else {
                audio.pause();
                playBtn.innerText = "▶";
                cover.style.animationPlayState = 'paused';
            }
        }

        function changeSong(i) {
            songs.forEach((_, idx) => {
                const items = document.querySelectorAll('.track-item');
                items[idx].classList.toggle('active', idx === i);
            });
            title.innerText = songs[i].title;
            cover.src = songs[i].cover;
            source.src = songs[i].file;
            audio.load();
            audio.play();
            playBtn.innerText = "⏸";
            cover.style.animationPlayState = 'running';
        }

        // 更新播放时间
        audio.ontimeupdate = () => {
            const min = Math.floor(audio.currentTime / 60);
            const sec = Math.floor(audio.currentTime % 60);
            document.getElementById('p-time').innerText = `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        };

        // 漂浮装饰
        const bgLayer = document.getElementById('bg-layer');
        const decoIcons = ['✨', '💖', '⭐', '🌸'];
        for (let i = 0; i < 20; i++) {
            let el = document.createElement('div');
            el.className = 'deco-item';
            el.innerHTML = decoIcons[Math.floor(Math.random() * decoIcons.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = Math.random() * 100 + 'vh';
            el.style.opacity = Math.random();
            el.style.fontSize = (Math.random() * 20 + 10) + 'px';
            el.style.color = '#fff';
            bgLayer.appendChild(el);
        }

        // 鼠标特效保持
        document.addEventListener('mousemove', (e) => {
            const s = document.createElement('div');
            s.className = 'star-effect';
            s.innerHTML = '✨';
            s.style.left = e.clientX + 'px'; s.style.top = e.clientY + 'px';
            s.style.color = '#ff80ab';
            document.body.appendChild(s);
            let op = 1;
            const ani = setInterval(() => {
                op -= 0.05;
                s.style.opacity = op;
                s.style.transform = `scale(${op + 0.5}) translateY(${10 - op*10}px)`;
                if(op <= 0) { clearInterval(ani); s.remove(); }
            }, 30);
        });
    </script>
</body>
</html>
