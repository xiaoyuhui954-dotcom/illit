<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MP3</title>

<style>
body {
    margin: 0;
    background: #c8e6e0; /* 低饱和绿 */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 播放器 */
.player {
    width: 260px;
    background: #f7b6c2;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* 屏幕 */
.screen {
    width: 100%;
    height: 120px;
    background: #222;
    border-radius: 10px;
    margin-bottom: 15px;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 按钮 */
.btn {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: white;
    border-radius: 10px;
    cursor: pointer;
}

/* 返回 */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← back</div>

<div class="player">

    <div class="screen">♪ music</div>

    <audio id="audio" src="music.mp3"></audio>

    <button class="btn" onclick="play()">▶</button>
    <button class="btn" onclick="pause()">⏸</button>

</div>

<script>
let audio = document.getElementById("audio");

function play() {
    audio.play();
}

function pause() {
    audio.pause();
}

function goBack() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
