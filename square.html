<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT 社区广场 ✨</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        /* --- 沿用你的 Y2K 风格背景 --- */
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(135deg, #ffc1e3 0%, #e1bee7 50%, #b3e5fc 100%);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; font-family: 'MS UI Gothic', 'Courier New', monospace;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .global-nav-bar {
            width: 100%; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px); border-bottom: 2px solid #ff80ab;
            padding: 10px 0; display: flex; justify-content: center;
            gap: 15px; position: fixed; top: 0; left: 0; z-index: 9999;
        }
        .global-nav-bar a { text-decoration: none; color: #ff4081; font-size: 14px; font-weight: bold; padding: 3px 8px; }

        /* --- 广场内容区 --- */
        .window {
            margin-top: 80px !important;
            width: 95% !important;
            max-width: 800px !important;
            background: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 10px 10px 0px rgba(255, 128, 171, 0.2);
        }

        /* 发布区域 */
        .post-box {
            background: rgba(255, 255, 255, 0.8);
            margin: 20px; padding: 15px;
            border: 2px dashed #ff80ab; border-radius: 10px;
        }
        textarea {
            width: 100%; height: 80px; border: 1px solid #ffb2d1;
            border-radius: 5px; padding: 10px; resize: none; outline: none;
            font-family: inherit;
        }
        .post-btn {
            margin-top: 10px; background: #ff80ab; color: white;
            border: none; padding: 5px 20px; border-radius: 15px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .post-btn:hover { background: #ff4081; transform: scale(1.05); }

        /* 广场动态列表 */
        #feed-container {
            padding: 0 20px 20px 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .feed-item {
            background: white; padding: 15px; border-radius: 10px;
            border: 1px solid #eee; position: relative;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-info { color: #ff4081; font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .post-content { color: #555; line-height: 1.4; }
        .post-time { font-size: 10px; color: #999; margin-top: 8px; }

        /* 删除按钮 */
        .del-btn {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none; color: #ccc;
            cursor: pointer; font-size: 14px;
        }
        .del-btn:hover { color: #ff4081; }

        /* 动态装饰 */
        .floating-deco {
            position: fixed; pointer-events: none; opacity: 0.25; z-index: -1;
            animation: drift linear infinite;
        }
        @keyframes drift { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-20vh) rotate(360deg); } }

        @media (max-width: 600px) { .window { margin-top: 60px !important; } }
    </style>
</head>
<body>

    <div class="global-nav-bar">
        <a href="index.html">🏠 首页</a>
        <a href="music.html">🎶 音乐</a>
        <a href="menu.html">📁 档案</a>
        <a href="game.html">🎮 游戏</a>
        <a href="photo.html">📸 合照</a>
        <a href="messages.html">💬 消息</a>
        <a href="square.html">✨ 广场</a>
    </div>

    <div id="deco-layer"></div>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">ILLIT_Community_Square.exe</div>
        </div>
        <div class="window-body">
            <p style="text-align: center; font-weight: bold; color: #ff4081; margin-top: 10px;">🌟 欢迎来到 ILLIT 广场！分享你的心情 🌟</p>
            
            <!-- 发布区 -->
            <div class="post-box">
                <textarea id="post-input" placeholder="输入你想说的话... ( Magnetic! )"></textarea>
                <div style="text-align: right;">
                    <button class="post-btn" onclick="publishPost()">发布动态</button>
                </div>
            </div>

            <!-- 动态流区 -->
            <div id="feed-container">
                <!-- 动态将在这里生成 -->
            </div>

            <div style="text-align: center; padding: 20px;">
                <button onclick="window.location.href='index.html'">返回桌面</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化广场数据（从 localStorage 读取）
        let posts = JSON.parse(localStorage.getItem('illit_square_posts')) || [
            { id: 1, user: "System", content: "欢迎来到广场！这里可以分享你的 Magnetic 时刻 ✨", time: "2026-05-04", isSystem: true }
        ];

        function renderPosts() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            
            // 倒序排列，最新的在上面
            [...posts].reverse().forEach(post => {
                const item = document.createElement('div');
                item.className = 'feed-item';
                item.innerHTML = `
                    <div class="user-info">💖 @${post.user}</div>
                    <div class="post-content">${post.content}</div>
                    <div class="post-time">${post.time}</div>
                    ${!post.isSystem ? `<button class="del-btn" onclick="deletePost(${post.id})">×</button>` : ''}
                `;
                container.appendChild(item);
            });
        }

        function publishPost() {
            const input = document.getElementById('post-input');
            if (!input.value.trim()) return alert("写点什么吧~");

            const newPost = {
                id: Date.now(),
                user: "User_" + Math.floor(Math.random()*1000), // 模拟用户名
                content: input.value,
                time: new Date().toLocaleString(),
                isSystem: false
            };

            posts.push(newPost);
            localStorage.setItem('illit_square_posts', JSON.stringify(posts));
            input.value = '';
            renderPosts();
        }

        function deletePost(id) {
            if(confirm("确定要删除这条动态吗？")) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('illit_square_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        // 沿用你的背景装饰脚本
        const decoLayer = document.getElementById('deco-layer');
        const icons = ['🌸', '✨', '☁️', '💖', '⭐'];
        for (let i = 0; i < 20; i++) {
            const el = document.createElement('div');
            el.className = 'floating-deco';
            el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 15 + 10) + 'px';
            el.style.animationDuration = (Math.random() * 10 + 15) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            el.style.top = '110vh';
            decoLayer.appendChild(el);
        }

        // 初始渲染
        renderPosts();
    </script>
</body>
</html>
