<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT 社区广场 ✨</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        /* --- 沿用 Y2K 风格背景 --- */
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(135deg, #ffc1e3 0%, #e1bee7 50%, #b3e5fc 100%);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; font-family: 'MS UI Gothic', 'Courier New', monospace;
        }

        @keyframes aurora {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .global-nav-bar {
            width: 100%; background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px); border-bottom: 2px solid #ff80ab;
            padding: 10px 0; display: flex; justify-content: center;
            gap: 15px; position: fixed; top: 0; left: 0; z-index: 9999;
        }
        .global-nav-bar a { text-decoration: none; color: #ff4081; font-size: 14px; font-weight: bold; padding: 3px 8px; }

        /* --- 广场内容区 --- */
        .window {
            margin-top: 80px !important;
            width: 95% !important;
            max-width: 800px !important;
            background: rgba(255, 255, 255, 0.6) !important;
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 10px 10px 0px rgba(255, 128, 171, 0.2);
        }

        /* 发布区域 */
        .post-box {
            background: rgba(255, 255, 255, 0.8);
            margin: 20px; padding: 15px;
            border: 2px dashed #ff80ab; border-radius: 10px;
        }
        textarea {
            width: 100%; height: 60px; border: 1px solid #ffb2d1;
            border-radius: 5px; padding: 10px; resize: none; outline: none;
            font-family: inherit; margin-bottom: 10px;
        }
        
        /* 图片上传控件样式 */
        .upload-area { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .file-input-label {
            background: #fff; border: 1px solid #ff80ab; color: #ff80ab;
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 12px;
        }
        #img-preview-container { 
            width: 60px; height: 60px; border: 1px solid #eee; 
            display: none; border-radius: 5px; overflow: hidden;
        }
        #img-preview-container img { width: 100%; height: 100%; object-fit: cover; }

        .post-btn {
            background: #ff80ab; color: white; border: none; 
            padding: 8px 25px; border-radius: 15px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .post-btn:hover { background: #ff4081; transform: scale(1.05); }

        /* 广场动态列表 */
        #feed-container { padding: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        .feed-item {
            background: white; padding: 15px; border-radius: 10px;
            border: 1px solid #eee; position: relative;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease;
        }
.post-media-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 这一行决定了：一行放3个 */
    gap: 8px;
    margin-top: 10px;
}

.post-img { 
    width: 100%; 
    aspect-ratio: 1 / 1; /* 强制变成正方形 */
    object-fit: cover;   /* 自动裁剪，保证图片不变形 */
    border-radius: 8px; 
    border: 1px solid #f0f0f0;
}

        .user-info { color: #ff4081; font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .post-content { color: #555; line-height: 1.4; white-space: pre-wrap; }
        .post-time { font-size: 10px; color: #999; margin-top: 8px; }

        /* 删除按钮 */
        .del-btn {
            position: absolute; top: 10px; right: 10px;
            background: none; border: none; color: #ccc;
            cursor: pointer; font-size: 14px;
        }
        .del-btn:hover { color: #ff4081; }

        /* 动态装饰 */
        .floating-deco {
            position: fixed; pointer-events: none; opacity: 0.25; z-index: -1;
            animation: drift linear infinite;
        }
        @keyframes drift { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-20vh) rotate(360deg); } }

        @media (max-width: 600px) { .window { margin-top: 60px !important; } }
    </style>
</head>
<body>

    <div class="global-nav-bar">
        <a href="index.html">🏠 首页</a>
        <a href="music.html">🎶 音乐</a>
        <a href="menu.html">📁 档案</a>
        <a href="game.html">🎮 游戏</a>
        <a href="photo.html">📸 合照</a>
        <a href="messages.html">💬 留言</a>
    </div>

    <div id="deco-layer"></div>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">ILLIT_Media_Square.exe</div>
        </div>
        <div class="window-body">
            <p style="text-align: center; font-weight: bold; color: #ff4081; margin-top: 10px;">📸 记录你的 Magnetic 瞬间！ 📸</p>
            
            <div class="post-box">
                <textarea id="post-input" placeholder="写下此刻的想法..."></textarea>
                
                <div class="upload-area">
                    <label class="file-input-label">
                        📁 选择图片
                        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="previewImage(this)">
                    </label>
                    <div id="img-preview-container">
                        <img id="img-preview" src="">
                    </div>
                    <div style="flex-grow: 1; text-align: right;">
                        <button class="post-btn" onclick="publishPost()">发布动态</button>
                    </div>
                </div>
            </div>

            <div id="feed-container"></div>

            <div style="text-align: center; padding: 20px;">
                <button onclick="window.location.href='index.html'">返回桌面</button>
            </div>
        </div>
    </div>

    <script>
        let posts = JSON.parse(localStorage.getItem('illit_square_posts_v2')) || [];
        let currentImageData = ""; // 用于存储当前选中的图片 Base64

        // 预览图片逻辑
        function previewImage(input) {
            const container = document.getElementById('img-preview-container');
            const preview = document.getElementById('img-preview');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result;
                    preview.src = currentImageData;
                    container.style.display = "block";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderPosts() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            
            [...posts].reverse().forEach(post => {
                const item = document.createElement('div');
                item.className = 'feed-item';
                item.innerHTML = `
                    <div class="user-info">🎀 @${post.user}</div>
                    <div class="post-content">${post.content}</div>
                ${post.image ? `
    <div class="post-media-grid">
        <img src="${post.image}" class="post-img" onclick="window.open(this.src)">
    </div>
` : ''}

                    <div class="post-time">${post.time}</div>
                    <button class="del-btn" onclick="deletePost(${post.id})">×</button>
                `;
                container.appendChild(item);
            });
        }

        function publishPost() {
            const input = document.getElementById('post-input');
            if (!input.value.trim() && !currentImageData) return alert("总得发点什么吧~");

            // 注意：localStorage 有容量限制（通常 5MB），图片不要太大
            const newPost = {
                id: Date.now(),
                user: "Fan_" + Math.floor(Math.random()*999),
                content: input.value,
                image: currentImageData,
                time: new Date().toLocaleString()
            };

            posts.push(newPost);
            try {
                localStorage.setItem('illit_square_posts_v2', JSON.stringify(posts));
            } catch (e) {
                alert("存储空间满了！请删除一些带图片的动态再试。");
            }

            // 重置表单
            input.value = '';
            currentImageData = '';
            document.getElementById('img-preview-container').style.display = 'none';
            document.getElementById('file-input').value = '';
            renderPosts();
        }

        function deletePost(id) {
            if(confirm("确定删除吗？")) {
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('illit_square_posts_v2', JSON.stringify(posts));
                renderPosts();
            }
        }

        // 背景装饰
        const decoLayer = document.getElementById('deco-layer');
        const icons = ['🌸', '✨', '💖', '⭐'];
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'floating-deco';
            el.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (Math.random() * 15 + 10) + 'px';
            el.style.animationDuration = (Math.random() * 10 + 15) + 's';
            el.style.top = '110vh';
            decoLayer.appendChild(el);
        }

        renderPosts();
    </script>
</body>
</html>
