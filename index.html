<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIT WORLD 🎀</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="desktop-icons">
        <p>ILLIT_Project_v1.exe</p>
    </div>

    <div class="window" style="width: 400px; margin: 50px auto;">
        <div class="title-bar">
            <div class="title-bar-text">WELCOME_TO_ILLIT.txt</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <h2 style="text-align: center;">Magnetic Love! 🧲</h2>
            <div class="image-container">
                <img src="IMG_4415.jpeg" alt="ILLIT" style="width: 100%;">
            </div>
            <p>欢迎来到 ILLIT 的复古应援站。点击下方按钮了解成员：</p>
            
            <section class="field-row" style="justify-content: center;">
                <button>YUNAH</button>
                <button>MINJU</button>
                <button>MOKA</button>
                <button>WONHEE</button>
                <button>IROHA</button>
                <hr> <p>快捷方式：</p>
<button onclick="window.location.href='music.html'">🎶 音乐频道</button>
<button onclick="window.location.href='player.html'">💿 播放器</button>
                <button onclick="window.location.href='menu.html'" style="margin-top:10px; width:100%; font-weight:bold;">📂 进入成员档案库</button>


            </section>
        </div>
        <div class="status-bar">
            <p class="status-bar-field">Status: Online</p>
            <p class="status-bar-field">Members: 5</p>
        </div>
    </div>
<script>
document.addEventListener('mousemove', function(e) {
    var star = document.createElement('div');
    star.innerHTML = '✨'; // 你也可以换成 🎀 或 💖
    star.style.position = 'fixed';
    star.style.left = e.clientX + 'px';
    star.style.top = e.clientY + 'px';
    star.style.fontSize = '20px';
    star.style.pointerEvents = 'none';
    star.style.zIndex = '9999';
    document.body.appendChild(star);

    // 让星星向下掉并消失
    var speed = 0;
    var interval = setInterval(function() {
        speed += 2;
        star.style.top = (parseInt(star.style.top) + speed) + 'px';
        star.style.opacity = star.style.opacity ? star.style.opacity - 0.05 : 1;
        if (star.style.opacity <= 0) {
            clearInterval(interval);
            star.remove();
        }
    }, 30);
});
</script>

</body>
</html>
