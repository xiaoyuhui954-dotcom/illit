<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>illit world</title>

<style>
body {
    margin: 0;
    background: #d8d6e8;
    font-family: "Courier New";
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 书本容器 */
.book-container {
    position: relative;
    width: 500px;
    height: 700px;
    perspective: 1500px; /* 透视效果 */
}

/* 翻书效果 */
.book {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transform: rotateY(0deg);
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.book:hover {
    transform: rotateY(180deg); /* 翻页效果 */
}

/* 封面 */
.cover {
    background: #f5f4fa;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #a8a3c7;
    font-size: 48px;
    font-weight: bold;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    position: absolute;
    width: 100%;
    height: 100%;
}

/* 页面 */
.page {
    background: #cfd3e6;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #555;
    font-size: 24px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    position: absolute;
    width: 100%;
    height: 100%;
}

/* 返回按钮 */
.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 20px;
    color: #a8a3c7;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="book-container">
    <div class="book">
        <!-- 翻书效果的封面 -->
        <div class="cover">
            <div>illit world</div>
        </div>

        <!-- 第二页 -->
        <div class="page" onclick="location.href='menu.html'">
            <div>点击进入主页</div>
        </div>
    </div>
</div>

<!-- 返回按钮 -->
<div class="back-btn" onclick="goBack()">← 返回首页</div>

<script>
function goBack() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
