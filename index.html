<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIT WORLD 🎀</title>
    <style>
        /* --- 1. 全局鼠标样式修改：改为你指定的亮薄荷绿 #B2FFFF --- */
        html, body, a, button, input {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%23B2FFFF" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), auto !important;
        }

        /* 鼠标移到按钮上的悬停颜色（稍微深一点点） */
        a:hover, button:hover {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><path d="M0,0 L0,15 L4,11 L7,17 L9,16 L6,10 L11,10 Z" fill="%2399FFFF" stroke="black" stroke-width="1" style="shape-rendering:crispEdges;"/></svg>'), pointer !important;
        }

        /* 保持粉色波点背景 */
        body {
            margin: 0; padding: 0;
            background-color: #ffb2d1;
            background-image: radial-gradient(#ffffff 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow: hidden; /* 防止浮动超出屏幕产生滚动条 */
        }

        .ver-tag {
            position: fixed; top: 10px; left: 15px;
            color: rgba(255,255,255,0.6); font-size: 10px;
        }

        /* --- 2. 浮动效果动画定义 --- */
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); } /* 向上浮动15像素 */
            100% { transform: translateY(0px); }
        }

        /* 响应式窗口 + 应用浮动动画 */
        .window {
            background: #ffffff; 
            border: 2px solid #5a8bc1; 
            width: 90%; 
            max-width: 550px; 
            box-shadow: 4px 4px 0px #000; /* 稍微加深阴影 */
            display: flex;
            flex-direction: column;
            /* 运行动画：3秒一个来回，无限循环，平滑过渡 */
            animation: floating 3s ease-in-out infinite; 
        }

        /* 蓝白渐变标题栏 */
        .win-header {
            background: linear-gradient(to right, #73a3d4, #b2d1f0);
            height: 30px;
            display: flex; justify-content: space-between;
            align-items: center; padding: 0 8px;
            border-bottom: 2px solid #5a8bc1;
        }
        .win-title { color: white; font-size: 14px; font-weight: bold; }
        .win-controls span {
            border: 1px solid #fff; background: #eee;
            font-size: 11px; padding: 1px 5px; margin-left: 2px; box-shadow: 1px 1px 0px #000;
        }

        /* 内容区 */
        .win-content { text-align: center; }
        .pink-title { color: #ff4081; font-weight: bold; margin: 20px 0; font-size: 24px; }
        
        .photo-frame { 
            width: 90%; 
            height: auto;
            border: 1px solid #888; 
            margin: 0 auto; 
            display: block; 
        }

        .welcome-msg { text-align: left; font-size: 14px; padding: 15px 25px; border-bottom: 1px solid #ccc; line-height: 1.5; }

        /* 快速访问：响应式布局 */
        .quick-access { padding: 15px 25px; text-align: left; }
        .access-label { font-size: 12px; margin-bottom: 10px; color: #333; font-weight: bold; }

        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
        }
        
        .btn-retro {
            background: #e1e1e1; border: 1px solid #999;
            padding: 10px 5px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            box-shadow: 2px 2px 0px #999, inset 1px 1px 0 #fff;
            transition: 0.2s;
        }
        .btn-retro:hover { background: #eee; transform: translate(-1px, -1px); box-shadow: 3px 3px 0px #888; }
        .btn-retro:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0px #999; }

        /* 底部状态栏 */
        .status-bar {
            background: #f0f0f0; border-top: 2px solid #5a8bc1;
            display: flex; justify-content: space-between;
            padding: 5px 15px; font-size: 12px; color: #444;
        }
    </style>
</head>
<body>

    <div class="ver-tag">ILLIT_Project_v1.exe</div>

    <div class="window">
        <!-- 标题栏 -->
        <div class="win-header">
            <div class="win-title">WELCOME_TO_ILLIT.txt</div>
            <div class="win-controls"><span>_</span><span>▢</span><span>X</span></div>
        </div>

        <div class="win-content">
            <div class="pink-title">Magnetic Love! 🎧</div>
            
            <img src="IMG_4415.jpeg" class="photo-frame" alt="ILLIT">

            <div class="welcome-msg">欢迎来到 ILLIT WORLD。</div>

            <div class="quick-access">
                <div class="access-label">快速访问:</div>
                <div class="nav-grid">
                    <div class="btn-retro" onclick="location.href='music.html'">🎶 音乐频道</div>
                    <div class="btn-retro" onclick="location.href='menu.html'">📁 档案库</div>
                    <div class="btn-retro" onclick="location.href='photos.html'">📸 合照区</div>
                    <div class="btn-retro" onclick="location.href='messages.html'">💬 留言区</div>
                    <div class="btn-retro" onclick="location.href='square.html'">✨ 粉丝广场</div>
                </div>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span>Status: Online</span>
            <span>Members: 5</span>
        </div>
    </div>

</body>
</html>
