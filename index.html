<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT ✨ Dreamy Multi-Universe</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        /* --- 1. 基础与全局装饰 --- */
        html { scroll-behavior: smooth; }
        body { 
            margin: 0; padding: 0; overflow-x: hidden; 
            font-family: "MS UI Gothic", sans-serif;
            cursor: url('https://img.icons8.com/fluency/24/star-burst.png'), auto; /* 自定义鼠标 */
        }
        
        /* 梦幻极光背景 */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #fce4ec, #e1f5fe, #f3e5f5, #e8f5e9);
            background-size: 400% 400%; animation: aurora 15s infinite; z-index: -3;
        }
        @keyframes aurora { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Y2K 点阵遮罩 */
        .grid-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 25px 25px; z-index: -2; pointer-events: none;
        }

        /* --- 2. 导航栏装饰 --- */
        .top-nav {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: rgba(255,255,255,0.3); backdrop-filter: blur(12px);
            padding: 8px 18px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.8);
            display: flex; gap: 12px; box-shadow: 0 8px 32px rgba(255,105,180,0.2);
        }
        .top-nav a { text-decoration: none; color: #ff4081; font-weight: bold; font-size: 12px; transition: 0.3s; }
        .top-nav a:hover { transform: scale(1.2); text-shadow: 0 0 8px #ff80ab; }

        /* --- 3. 窗口高级特效 (根据你的 style.css 强化) --- */
        .glass-win {
            background: rgba(255,255,255,0.4) !important;
            backdrop-filter: blur(15px); border-radius: 12px !important;
            border: 2px solid rgba(255,255,255,0.6) !important;
            animation: glow 3s infinite alternate, float 5s ease-in-out infinite;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px #fff, 0 0 20px #fce4ec; }
            to { box-shadow: 0 0 20px #fff, 0 0 40px #ff80ab; }
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* --- 4. 动态装饰元素 --- */
        .floating-deco { position: absolute; pointer-events: none; animation: pulse 2s infinite ease-in-out; z-index: 1; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } }
        
        .star { position: fixed; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; z-index: -1; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* --- 5. 功能板块布局 --- */
        section { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* 音乐 CD 旋转 */
        .cd-wrap { position: relative; width: 220px; height: 220px; margin: 0 auto; }
        .cd-rotate { width: 100%; height: 100%; border-radius: 50%; border: 8px solid rgba(255,255,255,0.8); animation: rotate 6s linear infinite; animation-play-state: paused; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>
    <div class="grid-mask"></div>

    <script>
        for(let i=0; i<50; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.width = Math.random()*4+'px';
            s.style.height = s.style.width;
            s.style.top = Math.random()*100+'vh';
            s.style.left = Math.random()*100+'vw';
            s.style.setProperty('--d', (Math.random()*3+2)+'s');
            document.body.appendChild(s);
        }
    </script>

    <nav class="top-nav">
        <a href="#home">HOME</a>
        <a href="#music">MUSIC</a>
        <a href="#members">MEMBERS</a>
        <a href="#camera">PHOTO</a>
        <a href="#game">GAME</a>
        <a href="#square">SQUARE</a>
    </nav>

    <section id="home">
        <img src="https://img.icons8.com/fluency/48/pixel-heart.png" class="floating-deco" style="top:15%; left:20%;">
        <img src="https://img.icons8.com/fluency/48/rainbow.png" class="floating-deco" style="bottom:20%; right:15%; animation-delay: 1s;">

            <div class="title-bar" style="background: linear-gradient(90deg, #ff80ab, #ea80fc) !important;">

            </div>
            <div class="window-body" style="text-align: center;">
                <div style="background: white; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                    <img src="image_32.png" style="width: 100%; filter: drop-shadow(0 0 5px #ff80ab);">
                </div>
                <h1 style="color: #ff4081; font-family: 'Comic Sans MS'; text-shadow: 2px 2px #fff;">ILLIT WORLD</h1>
                <p>Welcome to our dreamy space! 🎀✨</p>
                <button onclick="document.getElementById('music').scrollIntoView()">ENTER</button>
            </div>
        </div>
    </section>

    <section id="music">

                <div class="title-bar-text">Music_Player.mp3</div>
            </div>
            <div class="window-body" style="text-align: center;">
                <div class="cd-wrap">
                    <img id="cd" src="image_33.png" class="cd-rotate">
