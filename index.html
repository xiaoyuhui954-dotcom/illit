<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIT | SUPER REAL ME</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        :root {
            --pink: #ffc1e3; --blue: #b3e5fc; --purple: #e1bee7;
            --glass: rgba(255, 255, 255, 0.25);
        }

        /* 1. 高级背景：动态磨砂渐变 */
        body {
            margin: 0; padding: 0; overflow-x: hidden;
            font-family: 'Segoe UI', 'MS UI Gothic', sans-serif;
            background: linear-gradient(135deg, var(--pink), var(--blue), var(--purple));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

        /* 2. 侧边悬浮导航栏 */
        .side-nav {
            position: fixed; right: 30px; top: 50%; transform: translateY(-50%);
            z-index: 1000; display: flex; flex-direction: column; gap: 20px;
        }
        .nav-dot {
            width: 12px; height: 12px; background: white; border-radius: 50%;
            border: 2px solid var(--pink); cursor: pointer; transition: 0.3s;
        }
        .nav-dot:hover { transform: scale(1.5); background: var(--pink); }

        /* 3. 全屏板块架构 */
        section {
            height: 100vh; width: 100vw; display: flex;
            justify-content: center; align-items: center;
            perspective: 1000px;
        }

        /* 4. 音乐空间：3D 悬浮效果 */
        .music-island {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.4);
            padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transform: rotateY(-10deg); transition: 0.5s;
        }
        .music-island:hover { transform: rotateY(0deg) scale(1.02); }
        .cd-disk {
            width: 240px; height: 240px; border-radius: 50%;
            background: url('image_33.png') center/cover;
            border: 10px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.2);
            animation: spin 6s linear infinite; animation-play-state: paused;
        }
        @keyframes spin { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }

        /* 5. 拍立得区域：叠加层次感 */
        .pola-container { position: relative; width: 400px; height: 500px; }
        .pola-frame {
            background: white; padding: 15px 15px 60px 15px;
            box-shadow: 10px 10px 0px var(--pink); transform: rotate(-3deg);
        }
        .pola-video { width: 100%; height: 380px; background: #222; object-fit: cover; }
        .pola-controls { position: absolute; right: -150px; bottom: 0; }

        /* 6. 成员网格：悬浮卡片 */
        .member-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px;
            max-width: 1100px;
        }
        .m-profile {
            background: white; border-radius: 20px; padding: 15px;
            transition: 0.4s; cursor: pointer; text-align: center;
        }
        .m-profile:hover { transform: translateY(-20px); box-shadow: 0 15px 30px var(--pink); }
        .m-img { width: 150px; height: 150px; border-radius: 15px; object-fit: cover; }

        /* 通用按钮美化 */
        button {
            background: white; border: none; padding: 8px 15px;
            border-radius: 15px; color: #ff80ab; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #f8bbd0; margin: 5px;
        }
        button:active { transform: translateY(3px); box-shadow: none; }
        
        .sticker { position: absolute; cursor: move; width: 140px; z-index: 100; filter: drop-shadow(5px 5px 10px rgba(0,0,0,0.2)); }
    </style>
</head>
<body>

    <div class="side-nav">
        <a href="#home" class="nav-dot" title="Home"></a>
        <a href="#music" class="nav-dot" title="Music"></a>
        <a href="#members" class="nav-dot" title="Members"></a>
        <a href="#camera" class="nav-dot" title="Camera"></a>
        <a href="#game" class="nav-dot" title="DressUp"></a>
    </div>

    <!-- 首页板块 -->
    <section id="home">
        <div style="text-align: center;">
            <img src="image_32.png" style="width: 500px; filter: drop-shadow(0 0 20px #fff);">
            <h1 style="font-size: 4rem; color: white; text-shadow: 4px 4px var(--pink);">SUPER REAL ME</h1>
            <p style="color: white; font-weight: bold; letter-spacing: 2px;">ILLIT OFFICIAL FAN SITE</p>
        </div>
    </section>

    <!-- 音乐空间 -->
    <section id="music">
        <div class="music-island">
            <div class="cd-disk" id="disk"></div>
            <h2 style="margin-top:20px; color: white;">Magnetic - ILLIT</h2>
            <audio id="player" loop src="bgm.mp3"></audio>
            <div class="controls">
                <button onclick="playMusic()">PLAY</button>
                <button onclick="pauseMusic()">PAUSE</button>
                <input type="range" style="display:block; margin: 20px auto; width: 80%;" oninput="document.getElementById('player').volume=this.value/100">
            </div>
        </div>
    </section>

    <!-- 成员档案 -->
    <section id="members">
        <div class="member-grid">
            <div class="m-profile"><img src="yunah_face.png" class="m-img"><h3>YUNAH</h3></div>
            <div class="m-profile"><img src="minju_face.png" class="m-img"><h3>MINJU</h3></div>
            <div class="m-profile"><img src="moka_face.png" class="m-img"><h3>MOKA</h3></div>
            <div class="m-profile"><img src="wonhee_face.png" class="m-img"><h3>WONHEE</h3></div>
            <div class="m-profile"><img src="iroha_face.png" class="m-img"><h3>IROHA</h3></div>
        </div>
    </section>

    <!-- 拍立得合照 -->
    <section id="camera">
        <div class="pola-container">
            <div class="pola-frame" id="p-frame">
                <div class="pola-video" id="video-box">
                    <video id="v" autoplay playsinline style="width:100%; height:100%; object-fit:cover; transform:scaleX(-1);"></video>
                </div>
                <p style="font-family: 'Comic Sans MS'; font-size: 20px; margin-top: 15px;">Our Moment ✨</p>
            </div>
            <div class="pola-controls window glass-win" style="width: 200px;">
                <div class="title-bar"><div class="title-bar-text">Stickers</div></div>
                <div class="window-body">
                    <button onclick="addM('yunah_pose.png')">YUNAH</button>
                    <button onclick="addM('wonhee_pose.png')">WONHEE</button>
                    <button onclick="addM('iroha_pose.png')">IROHA</button>
                    <hr>
                    <button style="background: #e1f5fe;" onclick="document.getElementById('p-frame').style.background='#e1f5fe'">BLUE</button>
                    <button style="background: #fce4ec;" onclick="document.getElementById('p-frame').style.background='#fce4ec'">PINK</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 换装游戏板块 -->
    <section id="game">
        <div class="window glass-win" style="width: 700px; height: 500px;">
            <div class="title-bar"><div class="title-bar-text">ILLIT_Stylist_v2.0.exe</div></div>
            <div class="window-body" style="display:flex; height: 90%;">
                <div id="doll-area" style="flex:1; background:white; position:relative; overflow:hidden; border-radius:10px;">
                    <img src="base_doll.png" style="height:100%; display:block; margin: 0 auto;">
                </div>
                <div style="width: 200px; padding-left: 20px;">
                    <p>衣柜菜单:</p>
                    <img src="dress1.png" style="width:80px; cursor:pointer;" onclick="cloth('dress1.png')">
                    <button onclick="location.reload()" style="margin-top: 200px; width: 100%;">重置</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // 音乐交互
        const audio = document.getElementById('player');
        const disk = document.getElementById('disk');
        function playMusic() { audio.play(); disk.style.animationPlayState = 'running'; }
        function pauseMusic() { audio.pause(); disk.style.animationPlayState = 'paused'; }

        // 相机
        navigator.mediaDevices.getUserMedia({video:true}).then(s => document.getElementById('v').srcObject=s);

        // 核心：通用拖拽与克隆逻辑
        function makeDraggable(el) {
            let p1=0, p2=0, p3=0, p4=0;
            el.onmousedown = (e) => {
                e.preventDefault();
                p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmousemove = null; };
                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                    p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px";
                    el.style.left = (el.offsetLeft - p1) + "px";
                };
            };
        }

        function addM(src) {
            const img = document.createElement('img');
            img.src = src; img.className = 'sticker';
            img.style.top = '50px'; img.style.left = '20px';
            img.ondblclick = () => img.remove();
            document.getElementById('video-box').appendChild(img);
            makeDraggable(img);
        }

        function cloth(src) {
            const img = document.createElement('img');
            img.src = src; img.className = 'sticker';
            img.style.top = '100px'; img.style.left = '50px';
            document.getElementById('doll-area').appendChild(img);
            makeDraggable(img);
        }
    </script>
</body>
</html>
