<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>ILLIT ✨ Dreamcore World - TOTAL COMPLETE</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Press+Start+2P&family=Noto+Sans+SC:wght@500;700&display=swap');

        :root {
            --mint-green: #b2f2e8;
            --y2k-pink: #ffb2d1;
            --hot-pink: #ff4081;
            --soft-blue: #7d96ff;
            --phone-color: #ff85a1;
        }

        /* --- 1. 加载进度条 (修复显示) --- */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--mint-green); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loading-title { font-family: 'Press Start 2P'; font-size: 20px; color: #555; margin-bottom: 20px; }
        .progress-container { width: 300px; height: 30px; background: #fff; border: 4px solid #000; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--hot-pink); }

        /* --- 2. 基础布局 --- */
        body { margin: 0; background: var(--mint-green); overflow-x: hidden; font-family: "Noto Sans SC", sans-serif; scroll-behavior: smooth; }
        .main-content { display: none; }
        header { position:fixed; top:20px; right:30px; z-index:999; display:flex; gap:10px; }
        .y2k-btn { background:#fff; border:2px solid #000; padding:8px 15px; text-decoration:none; color:#000; font-family: 'Press Start 2P'; font-size: 10px; box-shadow: 4px 4px 0 #000; }
        
        section { min-height: 100vh; padding: 100px 20px; display: flex; flex-direction: column; align-items: center; position: relative; border-bottom: 2px dashed #fff; box-sizing: border-box; }

        /* --- 3. 首页 (超大合照) --- */
        .hero-section { background-image: radial-gradient(circle, #ffffff 1.5px, transparent 1.5px); background-size: 40px 40px; }
        .pixel-title { font-family: 'Press Start 2P'; font-size: 2.5rem; color: var(--soft-blue); text-shadow: 4px 4px var(--y2k-pink); margin-bottom: 30px; text-align: center; }
        .big-frame { background: #fff; padding: 20px 20px 60px 20px; border: 4px solid #000; box-shadow: 15px 15px 0px var(--y2k-pink); max-width: 850px; width: 90%; }
        .big-frame img { width: 100%; height: auto; border: 2px solid #000; }
        .frame-text { font-family: 'Ma Shan Zheng'; font-size: 2rem; text-align: center; margin-top: 20px; color: #555; }

        /* --- 4. 成员介绍 (3+2布局) --- */
        .members-grid { display: flex; flex-direction: column; gap: 40px; width: 100%; max-width: 1100px; margin-top: 40px; }
        .row-top, .row-bottom { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
        .member-card { width: 240px; background: #fff; border: 5px solid var(--hot-pink); border-radius: 25px; overflow: hidden; box-shadow: 8px 8px 0px rgba(0,0,0,0.1); }
        .member-photo { width: 100%; height: 200px; object-fit: cover; border-bottom: 5px solid var(--hot-pink); }
        .m-name { padding: 15px; text-align: center; font-weight: 900; color: var(--hot-pink); font-family: 'Press Start 2P'; font-size: 12px; }

        /* --- 5. 音乐播放器 (修复点歌 & 键盘) --- */
        .phone-container { display: flex; align-items: center; gap: 40px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .flip-phone { width: 300px; background: var(--phone-color); border: 6px solid #fff; border-radius: 40px; padding: 20px; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); }
        .screen-display { background: #1a1a1a; border-radius: 12px; padding: 15px; color: #0f0; border: 5px inset #444; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .cd-disk { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #fff; overflow: hidden; animation: spin 5s linear infinite; animation-play-state: paused; }
        .phone-bottom { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-top: 15px; }
        .phone-key { background: #fff; height: 40px; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: 'Press Start 2P'; font-size: 10px; }
        .music-list-memo { width: 280px; background: #fff9c4; border: 3px solid #333; padding: 20px; box-shadow: 8px 8px 0px var(--hot-pink); font-family: 'Ma Shan Zheng'; }
        .song-item { cursor: pointer; padding: 8px; border-bottom: 1px dashed #ffb2d1; font-size: 1.2rem; }
        .song-item.active { color: var(--hot-pink); font-weight: bold; }

        /* --- 6. 弹幕社区 --- */
        #message-board { background: var(--mint-green); overflow: hidden; }
        #danmaku-stage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .danmaku-text { position: absolute; white-space: nowrap; font-weight: bold; font-size: 1.8rem; text-shadow: 2px 2px 0px #fff; animation: fly linear forwards; font-family: 'Ma Shan Zheng'; }
        .input-area { z-index: 10; background: #fff; padding: 15px 30px; border-radius: 50px; border: 4px solid #000; display: flex; gap: 10px; width: 80%; max-width: 600px; }
        #danmaku-input { border: none; outline: none; flex: 1; font-size: 1.2rem; font-family: 'Ma Shan Zheng'; }

        @keyframes fly { from { left: 100%; } to { left: -150%; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 加载界面 -->
    <div id="loading-screen">
        <div class="loading-title">LOADING...</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div class="main-content" id="main-content">
        <header>
            <a href="#home" class="y2k-btn">HOME</a>
            <a href="#members" class="y2k-btn">MEMBERS</a>
            <a href="#music" class="y2k-btn">MUSIC</a>
            <a href="#message-board" class="y2k-btn">COMMUNITY</a>
        </header>

        <!-- 首页：大合照 -->
        <section id="home" class="hero-section">
            <div class="pixel-title">ILLIT OFFICIAL FANPAGE</div>
            <div class="big-frame">
                <img src="group_photo.png" alt="ILLIT ALL MEMBERS">
                <div class="frame-text">We are ILLIT! 💫</div>
            </div>
        </section>

        <!-- 成员档案 -->
        <section id="members">
            <h2 style="font-family:'Press Start 2P'; color:#fff; text-shadow:4px 4px var(--hot-pink);">MEMBERS</h2>
            <div class="members-grid">
                <div class="row-top">
                    <div class="member-card"><img src="yunah.png" class="member-photo"><div class="m-name">YUNAH</div></div>
                    <div class="member-card" style="border-color:var(--soft-blue);"><img src="minju.png" class="member-photo"><div class="m-name">MINJU</div></div>
                    <div class="member-card"><img src="moka.png" class="member-photo"><div class="m-name">MOKA</div></div>
                </div>
                <div class="row-bottom">
                    <div class="member-card" style="border-color:var(--soft-blue);"><img src="wonhee.png" class="member-photo"><div class="m-name">WONHEE</div></div>
                    <div class="member-card"><img src="iroha.png" class="member-photo"><div class="m-name">IROHA</div></div>
                </div>
            </div>
        </section>

        <!-- 播放器 -->
        <section id="music">
            <div class="phone-container">
                <div class="flip-phone">
                    <div class="screen-display">
                        <div class="cd-disk" id="cd-img"><img src="album_art.png" style="width:100%;"></div>
                        <div id="now-playing" style="margin-top:10px; font-size:12px; color:#fff;">Select a song...</div>
                    </div>
                    <div class="phone-bottom">
                        <div class="phone-key" onclick="playSong(0)">1</div>
                        <div class="phone-key" onclick="playSong(1)">2</div>
                        <div class="phone-key" onclick="playSong(2)">3</div>
                        <div class="phone-key" onclick="playSong(3)">4</div>
                        <div class="phone-key" onclick="toggleM()" style="background:var(--soft-blue); color:#fff;">P</div>
                        <div class="phone-key">6</div><div class="phone-key">7</div>
                        <div class="phone-key">8</div><div class="phone-key">9</div>
                        <div class="phone-key">*</div><div class="phone-key">0</div><div class="phone-key">#</div>
                    </div>
                    <audio id="audio" loop></audio>
                </div>
                <div class="music-list-memo">
                    <h3>🎵 PLAYLIST</h3>
                    <div class="song-item" onclick="playSong(0, 'Magnetic')">★ Magnetic</div>
                    <div class="song-item" onclick="playSong(1, 'My World')">★ My World</div>
                    <div class="song-item" onclick="playSong(2, 'Midnight Fiction')">★ Midnight Fiction</div>
                    <div class="song-item" onclick="playSong(3, 'Lucky Girl Syndrome')">★ Lucky Girl Syndrome</div>
                </div>
            </div>
        </section>

        <!-- 社区留言板 -->
        <section id="message-board">
            <div id="danmaku-stage"></div>
            <div class="pixel-title" style="font-size:1.5rem;">GLLIT COMMUNITY</div>
            <div class="input-area">
                <input type="text" id="danmaku-input" placeholder="留下你的应援吧...">
                <button onclick="sendDanmaku()" style="background:var(--hot-pink); color:#fff; border:none; padding:5px 20px; border-radius:20px; cursor:pointer;">发送</button>
            </div>
        </section>
    </div>

    <script>
        // 1. 加载条逻辑
        let prg = 0;
        const bar = document.getElementById('progress-bar');
        const loadScreen = document.getElementById('loading-screen');
        const mainContent = document.getElementById('main-content');
        
        const timer = setInterval(() => {
            prg += Math.random() * 10;
            if (prg >= 100) {
                prg = 100;
                clearInterval(timer);
                setTimeout(() => {
                    loadScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                }, 500);
            }
            bar.style.width = prg + '%';
        }, 100);

        // 2. 音乐逻辑
        const audio = document.getElementById('audio');
        const cd = document.getElementById('cd-img');
        const songs = [
            { name: "Magnetic", file: "magnetic.mp3" },
            { name: "My World", file: "myworld.mp3" },
            { name: "Midnight Fiction", file: "midnight.mp3" },
            { name: "Lucky Girl Syndrome", file: "luckygirl.mp3" }
        ];

        function playSong(index, name) {
            if(!songs[index]) return;
            audio.src = songs[index].file;
            audio.play();
            cd.style.animationPlayState = "running";
            document.getElementById('now-playing').innerText = "Playing: " + (name || songs[index].name);
            
            const items = document.querySelectorAll('.song-item');
            items.forEach((item, i) => i === index ? item.classList.add('active') : item.classList.remove('active'));
        }

        function toggleM() {
            if(audio.paused) { audio.play(); cd.style.animationPlayState = "running"; }
            else { audio.pause(); cd.style.animationPlayState = "paused"; }
        }

        // 3. 弹幕逻辑
        function sendDanmaku() {
            const input = document.getElementById('danmaku-input');
            if(!input.value) return;
            const el = document.createElement('div');
            el.className = 'danmaku-text';
            el.innerText = input.value;
            el.style.top = (Math.random()*60 + 20) + '%';
            el.style.animationDuration = (Math.random()*4 + 4) + 's';
            el.style.color = ['#ff4081', '#7d96ff', '#fff'].sort(() => Math.random() - 0.5)[0];
            document.getElementById('danmaku-stage').appendChild(el);
            input.value = '';
            setTimeout(() => el.remove(), 8000);
        }
    </script>
</body>
</html>
