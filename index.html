<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIT WORLD 🎀</title>
    <style>
        /* 核心 Y2K 审美背景：粉色波点纹理 */
        body {
            margin: 0; padding: 0;
            background-color: #ffb2d1;
            background-image: radial-gradient(#ffffff 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            font-family: "Courier New", Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh;
        }

        /* 左上角版本标识 */
        .version-label {
            position: fixed; top: 20px; left: 20px;
            color: #ffffff; font-size: 14px; opacity: 0.8;
        }

        /* 复古 Windows 窗口样式 */
        .window {
            background: #ffffff; border: 2px solid #5a8bc1; box-shadow: 2px 2px 0px #000;
            width: 90%; max-width: 450px; margin-top: 80px; position: relative;
        }
        .win-header {
            background: linear-gradient(to right, #73a3d4, #b2d1f0);
            padding: 4px 8px; display: flex; justify-content: space-between;
            color: white; font-size: 12px; border-bottom: 2px solid #5a8bc1;
        }
        .win-btns span { border: 1px solid #fff; padding: 0 5px; margin-left: 2px; background: #eee; color: #000; font-size: 10px; }

        /* 内容区 */
        .win-body { text-align: center; }
        .win-title-text { color: #ff4081; font-weight: bold; font-size: 20px; margin: 15px 0; }
        .main-photo { width: 90%; border: 1px solid #999; margin-bottom: 10px; }
        .welcome-text { font-size: 12px; text-align: left; padding: 0 20px 10px 20px; }

        /* 六格导航按钮区 */
        <div class="nav-grid">
    <div class="btn-retro" onclick="location.href='music.html'">🎶 音乐频道</div>
    <div class="btn-retro" onclick="location.href='member.html'">📁 档案库</div>
    <div class="btn-retro" onclick="location.href='game.html'">🎮 换装游戏</div>
    
    <div class="btn-retro" onclick="location.href='photo.html'">📸 合照区</div>
    
    <div class="btn-retro" onclick="location.href='guestbook.html'">💬 留言区</div>
    <div class="btn-retro" onclick="location.href='square.html'">✨ 粉丝广场</div>
</div>


        /* 底部状态栏 */
        .status-bar {
            border-top: 2px solid #5a8bc1; background: #f0f0f0;
            display: flex; justify-content: space-between; padding: 3px 10px; font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="version-label">ILLIT_Project_v1.exe</div>

    <div class="window">
        <!-- 窗口头部 -->
        <div class="win-header">
            <span>WELCOME_TO_ILLIT.txt</span>
            <div class="win-btns"><span>_</span><span>▢</span><span>X</span></div>
        </div>

        <!-- 窗口主体内容 -->
        <div class="win-body">
            <div class="win-title-text">Magnetic Love! 🎧</div>
            <img src="group_photo.png" class="main-photo" alt="ILLIT Members">
            <div class="welcome-text">欢迎来到 ILLIT WORLD。</div>

            <!-- 导航功能区 -->
            <div class="nav-section">
                <div class="nav-label">快速访问:</div>
                <div class="nav-grid">
                    <div class="btn-retro">🎶 音乐频道</div>
                    <div class="btn-retro">📁 档案库</div>
                    <div class="btn-retro">🎮 换装游戏</div>
                    <div class="btn-retro">📸 合照区</div>
                    <div class="btn-retro">💬 留言区</div>
                    <div class="btn-retro">✨ 粉丝广场</div>
                </div>
            </div>
        </div>

        <!-- 底部状态 -->
        <div class="status-bar">
            <span>Status: Online</span>
            <span>Members: 5</span>
        </div>
    </div>

</body>
</html>
