<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>illit world</title>

<style>
body {
    margin: 0;
    background: #d8d6e8;
    font-family: "Courier New";
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 容器 */
.book-container {
    position: relative;
    width: 400px;
    height: 600px;
    perspective: 1500px; /* 透视效果 */
}

/* 翻书效果 */
.book {
    position: absolute;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transform: rotateX(0);
    transition: transform 1s ease-in-out;
}

.book:hover {
    transform: rotateX(180deg); /* 翻页效果 */
}

/* 封面 */
.cover {
    background: #f5f4fa;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #a8a3c7;
    font-size: 48px;
    font-weight: bold;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

/* 页面 */
.page {
    background: #cfd3e6;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #555;
    font-size: 24px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

/* 书本背面 */
.back {
    background: #fff;
    color: transparent;
    visibility: hidden;
}
</style>
</head>

<body>

<!-- 书本 -->
<div class="book-container">
    <div class="book">
        <!-- 第一页（封面） -->
        <div class="cover">
            <div>illit world</div>
        </div>

        <!-- 第二页 -->
        <div class="page" onclick="location.href='menu.html'">
            <div>点击进入主页</div>
        </div>
    </div>
</div>

<script>
    // 页面翻书效果
    document.querySelector('.book').addEventListener('click', function () {
        this.style.transform = 'rotateX(180deg)';
    });
</script>

</body>
</html>
