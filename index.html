<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>illit world</title>

<style>
body {
    margin: 0;
    background: #d8d6e8; /* 低饱和梦幻色 */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: "Courier New";
}

/* 书本 */
.book {
    width: 300px;
    height: 400px;
    background: #f5f4fa;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
}

.book:hover {
    transform: scale(1.05);
}

/* 标题 */
.title {
    color: #a8a3c7;
    font-size: 28px;
    letter-spacing: 2px;
}
</style>
</head>

<body>

<div class="book" onclick="openBook()">
    <div class="title">illit world</div>
</div>

<script>
function openBook() {
    window.location.href = "menu.html";
}
</script>

</body>
</html>
