<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLIT WORLD 🎀</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fce4ec;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000;
            transition: opacity 0.5s;
        }
        .loading-content { text-align: center; }
        .bar-border {
            width: 200px; height: 15px; 
            background: #fff; border: 2px solid #ff80ab; 
            border-radius: 10px; margin: 10px auto; overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-content">
            <div style="font-size: 50px; margin-bottom: 15px;">🎀</div>
            <h2 style="color: #ff80ab; text-shadow: 1px 1px #fff;">ILLIT World Loading...</h2>
            <div class="bar-border">
                <div id="progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff80ab, #ce93d8); transition: width 0.1s;"></div>
            </div>
            <p id="progress-text" style="color: #ff80ab; font-weight: bold;">0%</p>
        </div>
    </div>

    <div class="desktop-icons">
        <p>ILLIT_Project_v1.exe</p>
    </div>

    <div class="window" style="width: 400px; margin: 50px auto;">
        <div class="title-bar">
            <div class="title-bar-text">WELCOME_TO_ILLIT.txt</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <h2 style="text-align: center;">Magnetic Love! 🎧</h2>
            <div class="image-container">
                <img src="IMG_4415.jpeg" alt="ILLIT" style="width: 100%;">
            </div>
            <p>欢迎来到 ILLIT 的复古应援站。</p>
            
            <hr>
            <p>快速访问：</p>
            <div class="field-row" style="justify-content: center; gap: 5px;">
                <button onclick="window.location.href='music.html'">🎶 音乐频道</button>
                <button onclick="window.location.href='player.html'">💿 播放器</button>
                <button onclick="window.location.href='menu.html'">📂 档案库</button>
                <button onclick="window.location.href='game.html'">🎮 换装游戏</button>

            </div>
        </div>
        <div class="status-bar">
            <p class="status-bar-field">Status: Online</p>
            <p class="status-bar-field">Members: 5</p>
        </div>
    </div>

    <script>
        // 检测是否是从内部返回的
        const urlParams = new URLSearchParams(window.location.search);
        const screen = document.getElementById('loading-screen');

        if (urlParams.get('from') === 'internal') {
            // 如果链接里有 ?from=internal，直接关掉加载层，不跑进度条
            screen.style.display = 'none';
        } else {
            // 否则正常跑进度条
            window.onload = function() {
                let bar = document.getElementById('progress-bar');
                let text = document.getElementById('progress-text');
                let width = 0;

                let timer = setInterval(() => {
                    width += Math.floor(Math.random() * 10) + 5; 
                    if (width >= 100) {
                        width = 100;
                        clearInterval(timer);
                        setTimeout(() => {
                            if(screen) {
                                screen.style.opacity = '0';
                                setTimeout(() => screen.style.display = 'none', 500);
                            }
                        }, 500);
                    }
                    if(bar) bar.style.width = width + '%';
                    if(text) text.innerText = width + '%';
                }, 80);
            };
        }

        // 星星特效逻辑
        document.addEventListener('mousemove', function(e) {
            var star = document.createElement('div');
            star.innerHTML = '✨';
            star.style.position = 'fixed';
            star.style.left = e.clientX + 'px';
            star.style.top = e.clientY + 'px';
            star.style.fontSize = '20px';
            star.style.pointerEvents = 'none';
            star.style.zIndex = '10001'; 
            document.body.appendChild(star);
            var speed = 0;
            var interval = setInterval(function() {
                speed += 2;
                star.style.top = (parseInt(star.style.top) + speed) + 'px';
                star.style.opacity = star.style.opacity ? star.style.opacity - 0.05 : 1;
                if (star.style.opacity <= 0) { clearInterval(interval); star.remove(); }
            }, 30);
        });
    </script>
</body>
</html>
